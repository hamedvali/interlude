<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interlude</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%237C4DEB'/%3E%3Crect x='7.4' y='6' width='3.2' height='12' rx='1.6' fill='white'/%3E%3Crect x='13.4' y='6' width='3.2' height='12' rx='1.6' fill='white'/%3E%3C/svg%3E" />
<style>
  :root {
    --bg-page:    #EAE6F8;
    --frame:      #ffffff;
    --surface-2:  #F4F2FB;
    --rail-1:     #7C4DEB;
    --rail-2:     #6733E0;
    --violet:     #7C4DEB;
    --violet-ink: #5B2FD0;
    --violet-soft:#EEE8FD;
    --ink-1:      #241F3A;
    --ink-2:      #6E6A85;
    --ink-3:      #A6A2BC;
    --line:       #ECEAF5;
    --yellow:#E5A81C; --yellow-soft:#FBF1D6;
    --coral:#F0714B;  --coral-soft:#FCE4DC;
    --cyan:#2FB2C6;   --cyan-soft:#DBF3F6;
    --peach1:#FDEBCB; --peach2:#FBD6A0;
    --good:#3FB27F; --good-soft:rgba(63,178,127,.14);
    --danger:#E8654F; --danger-soft:rgba(232,101,79,.14);
    --warn:#E8A33A;
    --box1:#E7DEFB; --box2:#C3AEF4; --box3:#9F7DEC; --box4:#7C4DEB; --box5:#5B2FD0;
    --shadow:    0 18px 44px rgba(84,60,168,.12);
    --shadow-sm: 0 6px 18px rgba(84,60,168,.08);
    --r-frame:28px; --r-card:22px;
    --font: ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --serif: Georgia,"Iowan Old Style","Times New Roman",serif;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme=light]) {
      --bg-page:#120E20; --frame:#1C1730; --surface-2:#26203C;
      --violet-soft:rgba(124,77,235,.20);
      --ink-1:rgba(255,255,255,.92); --ink-2:rgba(255,255,255,.60); --ink-3:rgba(255,255,255,.40);
      --line:rgba(255,255,255,.09);
      --yellow-soft:rgba(229,168,28,.18); --coral-soft:rgba(240,113,75,.18); --cyan-soft:rgba(47,178,198,.18);
      --peach1:#3B2E4E; --peach2:#2E2440;
      --box1:#332B4B; --box2:#4B3B7A; --box3:#6A49C4; --box4:#8A62EE; --box5:#B79CF6;
      --shadow:0 18px 44px rgba(0,0,0,.45); --shadow-sm:0 6px 18px rgba(0,0,0,.35);
    }
  }
  :root[data-theme=dark] {
    --bg-page:#120E20; --frame:#1C1730; --surface-2:#26203C;
    --violet-soft:rgba(124,77,235,.20);
    --ink-1:rgba(255,255,255,.92); --ink-2:rgba(255,255,255,.60); --ink-3:rgba(255,255,255,.40);
    --line:rgba(255,255,255,.09);
    --yellow-soft:rgba(229,168,28,.18); --coral-soft:rgba(240,113,75,.18); --cyan-soft:rgba(47,178,198,.18);
    --peach1:#3B2E4E; --peach2:#2E2440;
    --box1:#332B4B; --box2:#4B3B7A; --box3:#6A49C4; --box4:#8A62EE; --box5:#B79CF6;
    --shadow:0 18px 44px rgba(0,0,0,.45); --shadow-sm:0 6px 18px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; }
  body {
    background: var(--bg-page); color: var(--ink-1); font-family: var(--font);
    font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased;
    display:flex; height:100vh; padding:22px; overflow:hidden;
  }
  ::selection { background: var(--violet-soft); }
  .icon { stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; display:block; }

  .app { flex:1; display:flex; gap:20px; background:var(--frame); border-radius:var(--r-frame);
    padding:18px; box-shadow:var(--shadow); overflow:hidden; }

  /* ---------- Rail ---------- */
  .rail { width:82px; flex:0 0 82px; align-self:stretch; border-radius:26px;
    background:linear-gradient(180deg,var(--rail-1),var(--rail-2));
    display:flex; flex-direction:column; align-items:center; padding:22px 0 20px;
    box-shadow:0 16px 34px rgba(108,60,224,.34); }
  .rail-logo { width:42px; height:42px; border-radius:13px; background:rgba(255,255,255,.16);
    display:grid; place-items:center; color:#fff; margin-bottom:20px; }
  .rail-logo svg { width:20px; height:20px; }
  .rail-nav { display:flex; flex-direction:column; gap:12px; align-items:center; }
  .rico { width:48px; height:48px; border-radius:15px; border:0; background:transparent;
    color:rgba(255,255,255,.82); display:grid; place-items:center; cursor:pointer;
    transition:.16s; }
  .rico svg { width:22px; height:22px; }
  .rico:hover { background:rgba(255,255,255,.13); color:#fff; }
  .rico.active { background:#fff; color:var(--violet); box-shadow:0 10px 20px rgba(50,24,110,.30); transform:translateX(3px); }
  .rail-foot { margin-top:auto; display:flex; flex-direction:column; align-items:center; }

  /* ---------- Stage ---------- */
  .stage { flex:1; display:flex; flex-direction:column; min-width:0; padding:8px 6px 0; }
  .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:2px 6px 18px; }
  .status-pill { display:inline-flex; align-items:center; gap:10px; background:var(--surface-2);
    border:1px solid var(--line); border-radius:999px; padding:10px 18px; font-size:13.5px;
    color:var(--ink-2); min-width:230px; }
  .status-pill .sdot { width:8px; height:8px; border-radius:50%; background:var(--ink-3); flex:0 0 auto; }
  .status-pill.working .sdot { background:var(--violet); animation:pulse 1.3s ease-in-out infinite; }
  .status-pill.ready .sdot { background:var(--good); }
  @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8);} 50%{opacity:1;transform:scale(1);} }
  /* closing countdown modal */
  .close-modal { position:fixed; inset:0; z-index:1000; display:flex; align-items:center;
    justify-content:center; background:rgba(18,14,32,.42); backdrop-filter:blur(3px);
    animation:closeFade .18s ease-out; }
  .close-modal[hidden] { display:none; }
  @keyframes closeFade { from{opacity:0;} to{opacity:1;} }
  .close-card { width:300px; max-width:82vw; background:var(--frame); border:1px solid var(--line);
    border-radius:22px; padding:26px 24px 22px; text-align:center;
    box-shadow:0 24px 60px rgba(18,14,32,.34); animation:closePop .22s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes closePop { from{opacity:0;transform:translateY(10px) scale(.96);} to{opacity:1;transform:none;} }
  .close-ring { width:56px; height:56px; margin:2px auto 14px; border-radius:50%;
    background:var(--good-soft); color:var(--good); display:flex; align-items:center; justify-content:center; }
  .close-ring svg { width:30px; height:30px; fill:none; stroke:currentColor; stroke-width:2.2;
    stroke-linecap:round; stroke-linejoin:round; }
  /* per-state accent for the countdown card */
  .close-card.done .close-ring        { background:var(--violet-soft); color:var(--violet); }
  .close-card.needs_input .close-ring { background:var(--yellow-soft); color:var(--warn); }
  .close-card.permission .close-ring,
  .close-card.error .close-ring       { background:var(--danger-soft); color:var(--danger); }
  .close-card.needs_input .close-sub b { color:var(--warn); }
  .close-card.permission .close-sub b,
  .close-card.error .close-sub b       { color:var(--danger); }
  .close-title { font-size:17px; font-weight:700; color:var(--ink); letter-spacing:-.01em; }
  .close-sub { margin-top:5px; font-size:14px; color:var(--ink-2); }
  .close-sub b { display:inline-block; min-width:1ch; color:var(--violet); font-variant-numeric:tabular-nums;
    font-weight:800; font-size:15px; }
  .close-keep { margin-top:18px; width:100%; border:0; cursor:pointer; border-radius:12px;
    padding:11px 14px; font:inherit; font-size:14px; font-weight:650; color:#fff;
    background:linear-gradient(180deg,var(--rail-1),var(--rail-2)); transition:filter .12s; }
  .close-keep:hover { filter:brightness(1.06); }
  .close-hint { margin-top:11px; font-size:12px; color:var(--ink-3); }
  .close-hint kbd { font:inherit; font-size:11px; background:var(--surface-2); border:1px solid var(--line);
    border-bottom-width:2px; border-radius:6px; padding:1px 6px; color:var(--ink-2); }
  /* update toast */
  .toast { position:fixed; right:22px; bottom:22px; z-index:1200; display:flex; align-items:center; gap:12px;
    max-width:360px; background:var(--frame); border:1px solid var(--line); border-radius:16px;
    padding:13px 15px; box-shadow:var(--shadow); transform:translateY(18px); opacity:0; pointer-events:none;
    transition:opacity .2s ease, transform .2s ease; }
  .toast.show { transform:translateY(0); opacity:1; pointer-events:auto; }
  .toast .t-ico { width:34px; height:34px; border-radius:10px; flex:0 0 auto; display:grid; place-items:center;
    background:var(--violet-soft); color:var(--violet); }
  .toast .t-ico svg { width:18px; height:18px; }
  .toast .t-body { min-width:0; flex:1; }
  .toast .t-title { font-size:14px; font-weight:700; color:var(--ink-1); letter-spacing:-.01em; }
  .toast .t-sub { font-size:12.5px; color:var(--ink-2); margin-top:1px; }
  .toast .t-act { border:0; background:linear-gradient(180deg,var(--rail-1),var(--rail-2)); color:#fff;
    font:inherit; font-size:12.5px; font-weight:650; border-radius:10px; padding:8px 12px; cursor:pointer;
    flex:0 0 auto; transition:filter .12s; }
  .toast .t-act:hover { filter:brightness(1.06); }
  .toast .t-act.ghost { background:var(--surface-2); color:var(--ink-2); }
  .toast .spin { width:19px; height:19px; border-radius:50%; border:2.4px solid var(--violet-soft);
    border-top-color:var(--violet); animation:tspin .7s linear infinite; }
  @keyframes tspin { to { transform:rotate(360deg); } }
  .top-right { display:flex; align-items:center; gap:11px; }
  .chip { display:inline-flex; align-items:center; gap:8px; background:var(--frame);
    border:1px solid var(--line); border-radius:999px; padding:8px 14px; font-size:13px;
    color:var(--ink-2); box-shadow:var(--shadow-sm); white-space:nowrap; }
  .chip.streak b { color:var(--ink-1); font-weight:700; }
  .chip.streak svg { width:15px; height:15px; color:#EE9A2E; }
  .chip.brand { font-weight:650; color:var(--ink-1); }
  .chip.brand .bdot { width:20px; height:20px; border-radius:6px; background:var(--violet);
    display:grid; place-items:center; color:#fff; }
  .chip.brand .bdot svg { width:12px; height:12px; }
  .icon-btn { width:39px; height:39px; border-radius:12px; border:1px solid var(--line);
    background:var(--frame); display:grid; place-items:center; cursor:pointer; color:var(--ink-2);
    box-shadow:var(--shadow-sm); transition:.15s; }
  .icon-btn:hover { color:var(--ink-1); }
  .icon-btn svg { width:18px; height:18px; }

  /* snooze control (top-right) */
  .snooze-wrap { position:relative; }
  .icon-btn.snoozing { width:auto; gap:7px; padding:0 13px; color:var(--yellow);
    background:var(--yellow-soft); border-color:transparent; font-size:13px; font-weight:650; }
  .icon-btn.snoozing:hover { color:var(--yellow); }
  .icon-btn.snoozing svg { width:15px; height:15px; }
  .icon-btn.snoozing b { font-weight:700; }
  .snooze-menu { position:absolute; top:47px; right:0; z-index:50; min-width:172px;
    background:var(--surface-2); border:1px solid var(--line); border-radius:14px;
    box-shadow:var(--shadow); padding:7px; display:flex; flex-direction:column; gap:2px; }
  .snooze-menu[hidden] { display:none; }
  .snooze-cap { font-size:11px; font-weight:750; letter-spacing:.04em; text-transform:uppercase;
    color:var(--ink-3); padding:6px 10px 5px; }
  .snooze-menu button { text-align:left; border:0; background:transparent; color:var(--ink-1);
    font:inherit; font-size:13.5px; padding:9px 10px; border-radius:9px; cursor:pointer; }
  .snooze-menu button:hover { background:var(--frame); }
  .snooze-menu .snooze-resume { color:var(--violet); font-weight:650;
    border-top:1px solid var(--line); border-radius:0 0 9px 9px; margin-top:3px; }

  .scroller { flex:1; overflow-y:auto; padding:2px 10px 24px 6px; }
  .scroller::-webkit-scrollbar { width:10px; }
  .scroller::-webkit-scrollbar-thumb { background:var(--line); border-radius:8px; border:3px solid var(--frame); }
  .view { display:none; } .view.active { display:block; }

  .card { background:var(--frame); border:1px solid var(--line); border-radius:var(--r-card);
    box-shadow:var(--shadow-sm); padding:20px 22px; }
  .sec-title { font-size:19px; font-weight:750; letter-spacing:-.015em; margin:2px 0 15px; }
  .muted { color:var(--ink-3); font-size:12.5px; }

  /* ---------- Learn sub-tabs ---------- */
  .ltabs { display:flex; gap:6px; background:var(--surface-2); border:1px solid var(--line);
    border-radius:14px; padding:5px; margin:2px 0 18px; }
  .ltab { flex:1; border:0; background:transparent; color:var(--ink-2); font:inherit;
    font-size:13.5px; font-weight:650; padding:9px 10px; border-radius:10px; cursor:pointer;
    transition:.14s; white-space:nowrap; }
  .ltab:hover { color:var(--ink-1); }
  .ltab.on { background:var(--frame); color:var(--violet); box-shadow:var(--shadow-sm); }

  /* ---------- Buttons ---------- */
  .btn { border:1px solid var(--line); background:var(--surface-2); color:var(--ink-1);
    border-radius:14px; padding:13px 16px; font:inherit; font-weight:600; font-size:14px;
    cursor:pointer; transition:.15s; }
  .btn:hover { background:var(--violet-soft); }
  .btn.ghost { background:var(--frame); }
  .btn.primary { background:linear-gradient(135deg,#8A5EF2,#6E39E6); border-color:transparent;
    color:#fff; box-shadow:0 10px 20px rgba(108,60,224,.30); }
  .btn.primary:hover { filter:brightness(1.05); }
  .btn:active { transform:translateY(.5px); }
  .kbd { font-size:11px; color:var(--ink-3); border:1px solid var(--line); border-radius:6px;
    padding:2px 7px; background:var(--surface-2); }

  /* ---------- Learn ---------- */
  .grid-learn { display:grid; grid-template-columns:1fr 330px; gap:20px; align-items:start; }
  .col-main { display:flex; flex-direction:column; gap:18px; }
  .col-side { display:flex; flex-direction:column; gap:16px; }

  .hero { position:relative; overflow:hidden; border-radius:var(--r-card); min-height:158px;
    background:linear-gradient(115deg,var(--peach1),var(--peach2)); padding:26px 28px; display:flex; align-items:center; }
  .hero-text { position:relative; z-index:2; max-width:60%; }
  .hi { font-family:var(--serif); font-size:31px; font-weight:700; color:#B0591E; letter-spacing:-.01em; }
  .hero-sub { margin:9px 0 15px; color:#96652F; font-size:14px; max-width:340px; line-height:1.5; }
  .hero-stats { display:flex; gap:18px; }
  .hstat { display:flex; align-items:center; gap:7px; font-size:13px; color:#8A5B2A; }
  .hstat b { color:#6F4718; font-weight:700; }
  .hstat svg { width:15px; height:15px; color:#C77C33; }
  .hero-art { position:absolute; right:8px; top:0; bottom:0; width:238px; display:grid; place-items:center; z-index:1; }
  :root[data-theme=dark] .hi, .hi { }
  @media (prefers-color-scheme: dark) { :root:not([data-theme=light]) .hi { color:#F0C58A; }
    :root:not([data-theme=light]) .hero-sub { color:#C4A279; }
    :root:not([data-theme=light]) .hstat { color:#C4A279; } :root:not([data-theme=light]) .hstat b { color:#EBD3AE; }
    :root:not([data-theme=light]) .hstat svg { color:#E0B57E; } }
  :root[data-theme=dark] .hi { color:#F0C58A; }
  :root[data-theme=dark] .hero-sub { color:#C4A279; }
  :root[data-theme=dark] .hstat { color:#C4A279; } :root[data-theme=dark] .hstat b { color:#EBD3AE; }
  :root[data-theme=dark] .hstat svg { color:#E0B57E; }

  .flashcard { padding:22px 24px; }
  .fc-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .fc-eyebrow { font-size:11px; letter-spacing:.13em; color:var(--ink-3); font-weight:700; }
  .pill-mini { font-size:11.5px; color:var(--violet); background:var(--violet-soft); border-radius:999px;
    padding:4px 11px; font-weight:600; }
  .flash { min-height:216px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:12px; cursor:pointer; user-select:none; }
  .flash .eyebrow { font-size:12px; color:var(--ink-3); letter-spacing:.04em; }
  .flash .word { font-size:38px; font-weight:750; letter-spacing:-.02em; color:var(--ink-1); }
  .word-line { display:flex; align-items:center; justify-content:center; gap:13px; }
  .say { width:38px; height:38px; border-radius:50%; border:1px solid var(--line); background:var(--surface-2);
    color:var(--violet); display:grid; place-items:center; cursor:pointer; transition:.14s; flex:0 0 auto; }
  .say svg { width:19px; height:19px; }
  .say.say-sm { width:30px; height:30px; }
  .say.say-sm svg { width:15px; height:15px; }
  .say:hover { background:var(--violet-soft); border-color:transparent; }
  .say:active { transform:scale(.93); }
  .say.speaking { background:var(--violet); color:#fff; border-color:transparent; animation:sayPulse 1s ease-in-out infinite; }
  @keyframes sayPulse { 0%,100%{ box-shadow:0 0 0 0 var(--violet-soft); } 50%{ box-shadow:0 0 0 6px var(--violet-soft); } }
  /* per-word memory-aid picture (manual image URL, from any source) */
  .word-img-slot { display:flex; justify-content:center; }
  .word-img-fig { margin:0; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .word-img { display:block; max-width:260px; max-height:150px; width:auto; object-fit:cover;
    border-radius:12px; border:1px solid var(--line); background:var(--surface-2); }
  .word-img-slot.sm .word-img { max-height:96px; max-width:200px; }
  .say.imgadd.has { color:var(--violet); border-color:var(--violet); }
  /* picture popup (add / change a word's image URL) */
  .modal-back { position:fixed; inset:0; z-index:1000; background:rgba(18,14,32,.5);
    display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(2px); }
  .modal { background:var(--frame); border:1px solid var(--line); border-radius:16px; padding:20px;
    width:100%; max-width:380px; box-shadow:0 18px 50px rgba(0,0,0,.3); text-align:left; }
  .modal-h { font-size:16px; font-weight:750; color:var(--ink-1); }
  .modal-sub { font-size:12.5px; color:var(--ink-3); margin:4px 0 12px; line-height:1.45; }
  .modal-prev { display:flex; justify-content:center; margin:12px 0 0; }
  .modal-prev img { max-width:100%; max-height:150px; border-radius:11px; border:1px solid var(--line); }
  .modal-row { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
  .modal-row .btn { flex:0 0 auto; }
  .btn.ghost.danger { color:var(--danger); margin-right:auto; }
  /* type-in games: Context Gap, Dictation, Recall */
  .say.say-lg { width:56px; height:56px; margin:16px auto 0; }
  .say.say-lg svg { width:28px; height:28px; }
  .cloze-sent { font-size:21px; line-height:1.6; color:var(--ink-1); max-width:520px; margin:18px auto 10px; }
  .cloze-blank { color:var(--violet); font-weight:750; letter-spacing:2px; }
  .flash .pos { font-style:italic; color:var(--ink-3); font-size:14px; }
  .fc-meta { display:flex; align-items:center; justify-content:center; gap:9px; flex-wrap:wrap; }
  .flash .def { font-size:20px; line-height:1.45; color:var(--ink-1); max-width:460px; }
  .flash .ex { font-size:14px; color:var(--ink-2); font-style:italic; max-width:460px; }
  .tag { display:inline-block; font-size:11px; padding:3px 12px; border-radius:999px;
    background:var(--violet-soft); color:var(--violet); font-weight:600; }
  /* language pill — shown wherever a word is displayed (flashcard, games, deck) */
  .lang-badge { display:inline-flex; align-items:center; gap:5px; vertical-align:middle;
    font-size:10.5px; font-weight:700; letter-spacing:.02em; padding:2px 9px; border-radius:999px;
    background:var(--violet-soft); color:var(--violet); white-space:nowrap; }
  .lang-badge::before { content:""; width:6px; height:6px; border-radius:50%; background:currentColor; flex:0 0 auto; }
  .lang-en { background:var(--violet-soft); color:var(--violet); }
  .lang-nl { background:var(--coral-soft);  color:var(--coral); }
  .lang-de { background:var(--yellow-soft); color:var(--yellow); }
  .fc-actions { display:flex; gap:12px; margin-top:6px; } .fc-actions .btn { flex:1; }
  .fc-hint { text-align:center; margin-top:14px; color:var(--ink-3); font-size:12px; }

  /* stat cards */
  .side-head { display:flex; align-items:baseline; justify-content:space-between; }
  .side-head h3 { font-size:14.5px; font-weight:750; margin:0; }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; }
  .stat-grid.four { grid-template-columns:repeat(4,1fr); }
  .stat-card { border-radius:18px; padding:15px 16px; color:#fff; min-height:104px;
    display:flex; flex-direction:column; justify-content:space-between; box-shadow:var(--shadow-sm); }
  .stat-card .sc-ico { width:32px; height:32px; border-radius:10px; background:rgba(255,255,255,.22);
    display:grid; place-items:center; color:#fff; }
  .stat-card .sc-ico svg { width:17px; height:17px; }
  .stat-card b { font-size:27px; font-weight:750; line-height:1; }
  .stat-card span { font-size:12.5px; opacity:.92; display:block; margin-top:3px; }
  .stat-card.violet { background:linear-gradient(135deg,#8A5EF2,#6E39E6); }
  .stat-card.yellow { background:linear-gradient(135deg,#F6C948,#EAAB1C); }
  .stat-card.coral  { background:linear-gradient(135deg,#FCA07E,#F0714B); }
  .stat-card.cyan   { background:linear-gradient(135deg,#5FD6E4,#2FB2C6); }

  /* ---------- Words (deck manager) ---------- */
  .words-bar { display:flex; gap:10px; align-items:center; margin:2px 0 14px; }
  .words-search { position:relative; flex:1; min-width:0; }
  .words-search svg { position:absolute; left:12px; top:50%; transform:translateY(-50%);
    width:16px; height:16px; color:var(--ink-3); pointer-events:none; }
  .wsearch-input { width:100%; border:1px solid var(--line); background:var(--surface-2); color:var(--ink-1);
    border-radius:12px; padding:11px 13px 11px 36px; font:inherit; font-size:14px; outline:none; transition:.14s; }
  .wsearch-input:focus { border-color:var(--violet); box-shadow:0 0 0 3px var(--violet-soft); background:var(--frame); }
  .words-add { display:inline-flex; align-items:center; gap:7px; padding:11px 15px; white-space:nowrap; }
  .words-add svg { width:16px; height:16px; }

  .word-rows { display:flex; flex-direction:column; gap:8px; }
  .word-row { display:flex; align-items:center; gap:12px; padding:12px 14px; border:1px solid var(--line);
    border-radius:14px; background:var(--frame); box-shadow:var(--shadow-sm); transition:.14s; }
  .word-row:hover { border-color:var(--box2); }
  .word-row.confirming { border-color:var(--danger); background:var(--danger-soft); }
  .wr-main { flex:1; min-width:0; }
  .wr-top { display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
  .wr-word { font-weight:700; font-size:15px; color:var(--ink-1); letter-spacing:-.01em; }
  .wr-pos { font-style:italic; font-size:12px; color:var(--ink-3); }
  .wr-box { font-size:10.5px; font-weight:700; color:var(--violet); background:var(--violet-soft);
    border-radius:999px; padding:2px 8px; }
  .wr-def { font-size:13px; color:var(--ink-2); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .wr-acts { display:flex; align-items:center; gap:6px; flex:0 0 auto; }
  .wr-btn { width:34px; height:34px; border-radius:10px; border:1px solid var(--line); background:var(--surface-2);
    color:var(--ink-2); display:grid; place-items:center; cursor:pointer; transition:.14s; }
  .wr-btn svg { width:16px; height:16px; }
  .wr-btn:hover { color:var(--ink-1); background:var(--violet-soft); }
  .wr-btn.danger:hover { color:var(--danger); background:var(--danger-soft); border-color:transparent; }
  .wr-confirm { font-size:12.5px; font-weight:650; color:var(--danger); margin-right:2px; }

  .words-none { text-align:center; color:var(--ink-3); font-size:13.5px; padding:26px 10px; }
  .words-empty { text-align:center; display:flex; flex-direction:column; align-items:center; gap:9px; padding:30px 24px; }
  .words-empty .we-ic { width:48px; height:48px; border-radius:14px; display:grid; place-items:center;
    background:var(--violet-soft); color:var(--violet); }
  .words-empty .we-ic svg { width:23px; height:23px; }
  .words-empty .we-t { font-weight:750; font-size:16.5px; color:var(--ink-1); letter-spacing:-.01em; }
  .words-empty .we-s { font-size:13px; color:var(--ink-3); max-width:360px; line-height:1.5; }
  .words-empty .we-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:6px; }
  .words-empty .btn { display:inline-flex; align-items:center; gap:7px; }
  .words-empty .btn svg { width:16px; height:16px; }

  /* packs browser */
  .pack-list { display:flex; flex-direction:column; gap:10px; }
  .pack-card { display:flex; align-items:center; gap:14px; padding:16px 18px; }
  .pack-card .pc-main { flex:1; min-width:0; }
  .pack-card .pc-top { display:flex; align-items:baseline; gap:9px; flex-wrap:wrap; }
  .pack-card .pc-name { font-weight:750; font-size:15.5px; color:var(--ink-1); letter-spacing:-.01em; }
  .pack-card .pc-count { font-size:12px; font-weight:650; color:var(--ink-3); }
  .pack-card .pc-note { font-size:12.5px; color:var(--ink-3); line-height:1.45; margin-top:4px; }
  .pack-card .pack-msg { min-height:0; font-size:12.5px; }
  .pack-card .pack-msg:not(:empty) { margin-top:8px; }
  .pack-card .pack-msg .yes { color:var(--good); font-weight:650; }
  .pack-card .pack-msg .no { color:var(--danger); font-weight:650; }
  .pack-card .pack-msg .pc-dim, .pack-card .pack-msg .pc-loading { color:var(--ink-3); font-weight:600; }
  .pack-card .pc-add { flex:0 0 auto; white-space:nowrap; align-self:center; }
  .pack-card .pc-add svg { width:16px; height:16px; }

  /* settings ▸ sync across machines */
  .sync-on { display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:650;
    color:var(--good); background:var(--good-soft); padding:9px 13px; border-radius:12px; }
  .sync-on svg { width:16px; height:16px; flex:0 0 auto; }
  .sync-on code { font-weight:650; word-break:break-all; }
  .sync-warn { margin-top:9px; font-size:12.5px; color:var(--danger);
    background:var(--danger-soft); padding:9px 12px; border-radius:11px; line-height:1.45; }
  .sync-input { display:flex; gap:9px; align-items:center; margin-top:12px; }
  .sync-input input.text { flex:1; text-transform:none; font-size:14px; }
  .sync-input .btn { flex:0 0 auto; white-space:nowrap; }
  .sync-hint { margin-top:8px; font-size:12px; }
  #syncBody .pc-msg { min-height:0; font-size:12.5px; color:var(--ink-2); font-weight:600; }
  #syncBody .pc-msg:not(:empty) { margin-top:9px; }
  #syncBody .set-desc { margin-top:2px; }

  /* word editor (add / edit) */
  .editor-bar { display:flex; align-items:center; gap:12px; margin:2px 0 14px; }
  .editor-card { display:flex; flex-direction:column; gap:15px; padding:20px 22px; }
  .fld { display:flex; flex-direction:column; gap:7px; }
  .fld-l { font-size:12.5px; font-weight:700; color:var(--ink-1); }
  .fld-l em { font-style:normal; font-weight:600; color:var(--ink-3); font-size:11.5px; margin-left:5px; }
  .finput { width:100%; border:1px solid var(--line); background:var(--surface-2); color:var(--ink-1);
    border-radius:12px; padding:11px 13px; font:inherit; font-size:14.5px; outline:none; transition:.14s; }
  textarea.finput { resize:vertical; min-height:44px; line-height:1.45; }
  .finput:focus { border-color:var(--violet); box-shadow:0 0 0 3px var(--violet-soft); background:var(--frame); }
  .editor-msg { min-height:18px; font-size:13px; }
  .editor-msg .no { color:var(--danger); font-weight:650; }
  .editor-actions { display:flex; gap:10px; justify-content:flex-end; }
  .editor-actions .btn { min-width:118px; }

  /* ---------- Play ---------- */
  .game-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:18px; }
  .game-card { text-align:left; border:1px solid var(--line); background:var(--frame); border-radius:18px;
    padding:16px; cursor:pointer; transition:.16s; box-shadow:var(--shadow-sm); }
  .game-card:hover { transform:translateY(-2px); }
  .gc-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:26px; }
  .gc-ico { width:38px; height:38px; border-radius:12px; display:grid; place-items:center; }
  .gc-ico svg { width:19px; height:19px; }
  .gc-name { font-weight:700; font-size:14.5px; color:var(--ink-1); }
  .gc-sub { font-size:12px; color:var(--ink-3); margin-top:3px; }
  .game-card.violet .gc-ico { background:var(--violet-soft); color:var(--violet); }
  .game-card.yellow .gc-ico { background:var(--yellow-soft); color:var(--yellow); }
  .game-card.coral  .gc-ico { background:var(--coral-soft);  color:var(--coral); }
  .game-card.cyan   .gc-ico { background:var(--cyan-soft);   color:var(--cyan); }
  .game-card.on { color:#fff; border-color:transparent; }
  .game-card.on .gc-name { color:#fff; } .game-card.on .gc-sub { color:rgba(255,255,255,.8); }
  .game-card.on .gc-ico { background:rgba(255,255,255,.22); color:#fff; }
  .game-card.on.violet { background:linear-gradient(135deg,#8A5EF2,#6E39E6); }
  .game-card.on.yellow { background:linear-gradient(135deg,#F6C948,#EAAB1C); }
  .game-card.on.coral  { background:linear-gradient(135deg,#FCA07E,#F0714B); }
  .game-card.on.cyan   { background:linear-gradient(135deg,#5FD6E4,#2FB2C6); }
  .toggle { width:34px; height:19px; border-radius:999px; background:var(--line); position:relative; flex:0 0 auto; transition:.15s; }
  .toggle::after { content:""; position:absolute; top:2px; left:2px; width:15px; height:15px; border-radius:50%;
    background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.22); transition:.15s; }
  .toggle.on { background:rgba(255,255,255,.5); } .toggle.on::after { left:17px; }
  /* arcade launcher card — "enter" arrow instead of a toggle */
  .gc-go { width:26px; height:26px; border-radius:9px; display:grid; place-items:center;
    color:var(--ink-3); background:var(--surface-2); transition:.15s; flex:0 0 auto; }
  .gc-go svg { width:16px; height:16px; }
  .game-card:hover .gc-go { color:var(--violet); background:var(--violet-soft); transform:translateX(2px); }
  /* arcade game embed */
  .card.arcade { padding:0; overflow:hidden; }
  .arcade-frame { width:100%; height:600px; max-height:74vh; border:0; display:block; background:var(--bg-page); border-radius:var(--r-card); }
  /* arcade player — game fills the whole section */
  .view.playing { height:100%; }
  .arcade-player { display:flex; flex-direction:column; height:100%; min-height:440px; gap:14px; }
  .arcade-bar { display:flex; align-items:center; gap:12px; flex:0 0 auto; }
  .arcade-back { display:inline-flex; align-items:center; gap:4px; padding:9px 14px 9px 10px; }
  .arcade-back svg { width:18px; height:18px; }
  .arcade-title { font-weight:750; font-size:16px; letter-spacing:-.01em; color:var(--ink-1); }
  .arcade-stage { flex:1 1 auto; min-height:0; border:1px solid var(--line); border-radius:var(--r-card);
    overflow:hidden; background:var(--bg-page); box-shadow:var(--shadow-sm); }
  .arcade-stage.arcade { padding:0; }
  .arcade-stage .arcade-frame { height:100%; max-height:none; border-radius:0; }
  .sec-title.sub { margin-top:24px; }

  /* ---------- Social ---------- */
  .social-head { display:flex; align-items:center; justify-content:space-between; gap:14px; margin:2px 0 14px; }
  .stabs { display:inline-flex; gap:6px; background:var(--surface-2); border:1px solid var(--line);
    border-radius:14px; padding:5px; }
  .stab { display:inline-flex; align-items:center; gap:8px; border:0; background:transparent; color:var(--ink-2);
    font:inherit; font-size:13.5px; font-weight:650; padding:8px 14px; border-radius:10px; cursor:pointer; transition:.14s; }
  .stab:hover { color:var(--ink-1); }
  .stab.on { background:var(--frame); color:var(--ink-1); box-shadow:var(--shadow-sm); }
  .stab-ic { width:20px; height:20px; border-radius:6px; display:grid; place-items:center; color:#fff; flex:0 0 auto; }
  .stab-ic svg { width:13px; height:13px; }
  .stab-ic.ig { background:linear-gradient(135deg,#F9CE34,#EE2A7B,#6228D7); }
  .stab-ic.x, .stab-ic.tt { background:#000; }
  :root[data-theme=dark] .stab-ic.x, :root[data-theme=dark] .stab-ic.tt { border:1px solid rgba(255,255,255,.16); }
  .spop { display:inline-flex; align-items:center; gap:7px; padding:9px 14px; font-size:13px; }
  .spop svg { width:14px; height:14px; }
  .social-stage { position:relative; width:100%; height:calc(100vh - 250px); min-height:340px;
    border-radius:var(--r-card); border:1px solid var(--line); background:var(--surface-2); overflow:hidden; }
  .social-empty { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:9px; text-align:center; padding:24px; }
  .social-empty .se-ic { width:48px; height:48px; border-radius:14px; display:grid; place-items:center;
    background:var(--violet-soft); color:var(--violet); }
  .social-empty .se-ic svg { width:23px; height:23px; }
  .social-empty .se-t { font-weight:750; font-size:16.5px; color:var(--ink-1); letter-spacing:-.01em; }
  .social-empty .se-s { font-size:13px; color:var(--ink-3); max-width:360px; line-height:1.5; }
  .social-empty .btn { margin-top:6px; }

  /* game internals — shared layout system across all word games */
  .game-eyebrow { font-size:11.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    color:var(--ink-3); margin:2px 0 14px; }
  .game-prompt { font-size:26px; font-weight:750; letter-spacing:-.02em; color:var(--ink-1); margin:2px 0; }
  .game-prompt.text { font-size:20px; font-weight:600; letter-spacing:0; line-height:1.5; max-width:520px; margin:2px auto; }
  .game-clue { font-size:14.5px; color:var(--ink-2); line-height:1.5; max-width:480px; margin:10px auto 0; }
  .game-clue em { font-style:italic; }
  .game-meta { display:flex; align-items:center; justify-content:center; gap:9px; flex-wrap:wrap; margin:12px 0 16px; }
  .game-actions { display:flex; gap:10px; max-width:360px; margin:18px auto 0; }
  .game-actions > * { flex:1; }
  .opt { display:flex; align-items:center; gap:12px; width:100%; text-align:left; margin:8px 0;
    padding:14px 16px; border:1px solid var(--line); border-radius:13px; background:var(--surface-2);
    color:var(--ink-1); font:inherit; font-size:14.5px; cursor:pointer; transition:.14s; }
  .opt .key { width:21px; height:21px; border-radius:6px; border:1px solid var(--line); font-size:11px;
    display:grid; place-items:center; color:var(--ink-3); flex:0 0 auto; }
  .opt:hover { background:var(--violet-soft); }
  .opt.correct { background:var(--good-soft); border-color:var(--good); }
  .opt.correct .key { border-color:var(--good); color:var(--good); }
  .opt.wrong { background:var(--danger-soft); border-color:var(--danger); }
  .opt:disabled { cursor:default; }
  .letters { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:18px 0; }
  .lchip { width:40px; height:50px; border:1px solid var(--line); border-radius:11px; background:var(--surface-2);
    display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:750; text-transform:uppercase; transition:.14s; }
  .lchip.used { opacity:.3; border-color:transparent; background:var(--surface-1); text-decoration:line-through; }
  /* per-letter answer boxes (Scramble, Context Gap, Dictation, Recall) */
  .lboxes { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:18px auto; max-width:520px; }
  .lbox { width:42px; height:52px; border:1.5px solid var(--line); border-radius:11px; background:var(--surface-2);
    text-align:center; font:inherit; font-size:22px; font-weight:750; text-transform:uppercase; color:var(--ink-1);
    padding:0; outline:none; caret-color:var(--violet); transition:border-color .14s, box-shadow .14s, background .2s, color .2s; }
  .lbox:focus { border-color:var(--violet); box-shadow:0 0 0 3px var(--violet-soft); }
  .lbox.ok   { background:var(--good); border-color:var(--good); color:#fff; }
  .lbox.bad  { background:var(--danger); border-color:var(--danger); color:#fff; animation:lboxShake .3s; }
  .lbox.lock { background:var(--good-soft); border-color:var(--good); color:var(--good); }
  .lbox-space { width:14px; }
  .lbox-sep { min-width:16px; display:flex; align-items:flex-end; justify-content:center; padding-bottom:8px;
    font-size:22px; font-weight:750; color:var(--ink-3); }
  @keyframes lboxShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  /* Hangman — blanks + missed-letter strip (no on-screen keyboard; you type) */
  .hangman-word { font-size:26px; font-weight:750; letter-spacing:6px; margin:18px 0 12px; color:var(--ink-1); }
  .wrong-strip { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; min-height:26px; margin:6px 0 2px; }
  .wrong-chip { font-size:14px; font-weight:700; text-transform:uppercase; color:var(--danger);
    text-decoration:line-through; opacity:.7; width:22px; text-align:center; }
  .dots { display:flex; gap:6px; justify-content:center; margin:4px 0 10px; }
  .life { width:9px; height:9px; border-radius:50%; background:var(--good); }
  .life.gone { background:var(--line); }
  .grid-guess { display:flex; gap:7px; justify-content:center; margin:6px 0; }
  .gcell { width:44px; height:44px; border:1px solid var(--line); border-radius:10px; display:flex;
    align-items:center; justify-content:center; font-size:19px; font-weight:750; text-transform:uppercase; background:var(--surface-2); }
  .gcell.hit  { background:var(--good); border-color:var(--good); color:#fff; }
  .gcell.near { background:var(--warn); border-color:var(--warn); color:#fff; }
  .gcell.miss { background:var(--surface-2); border-color:var(--line); color:var(--ink-3); }
  .gcell.filled { border-color:var(--ink-3); color:var(--ink-1); }
  .gcell.active { border-color:var(--violet); box-shadow:0 0 0 3px var(--violet-soft); }
  input.text { width:100%; padding:13px 15px; border:1px solid var(--line); border-radius:13px; font:inherit;
    font-size:16px; background:var(--surface-2); color:var(--ink-1); text-transform:uppercase; outline:none; }
  input.text:focus { border-color:var(--violet); box-shadow:0 0 0 3px var(--violet-soft); }
  .row { display:flex; gap:10px; } .row > * { flex:1; }
  .center { text-align:center; }
  .msg { min-height:20px; margin-top:12px; font-size:13.5px; }
  .msg .ok { color:var(--good); font-weight:700; } .msg .no { color:var(--danger); font-weight:700; }
  .msg .ok svg, .msg .no svg { width:13px; height:13px; vertical-align:-1px; }

  /* ---------- Progress ---------- */
  .prog-wrap { display:flex; flex-direction:column; gap:18px; }
  .grid-prog { display:grid; grid-template-columns:340px 1fr; gap:18px; align-items:start; }
  .col { display:flex; flex-direction:column; gap:18px; }
  .gauge-card { display:flex; flex-direction:column; align-items:center; }
  .gauge { width:236px; height:236px; margin:8px 0 6px; }
  .gauge .g-val { font-family:var(--font); font-size:42px; font-weight:750; fill:var(--ink-1); }
  .gauge .g-pct { font-size:19px; fill:var(--ink-3); }
  .gauge .g-cap { font-family:var(--font); font-size:12px; fill:var(--ink-3); letter-spacing:.12em; text-transform:uppercase; }
  .gauge-legend { font-size:12.5px; color:var(--ink-2); }
  .chart-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .chart-head .t { font-weight:750; font-size:14.5px; }
  .area .aline { fill:none; stroke:var(--violet); stroke-width:2.5; stroke-linejoin:round; stroke-linecap:round; vector-effect:non-scaling-stroke; }
  .area .grid { stroke:var(--line); stroke-dasharray:4 5; vector-effect:non-scaling-stroke; }
  .area .dot { fill:var(--frame); stroke:var(--violet); stroke-width:2; vector-effect:non-scaling-stroke; cursor:pointer; }
  .area .dot.peak { fill:var(--violet); }
  .area .ax { fill:var(--ink-3); font-size:11px; font-family:var(--font); }
  .box-row { display:flex; align-items:center; gap:12px; margin:9px 0; }
  .box-row .name { width:50px; font-size:12.5px; color:var(--ink-2); }
  .box-track { display:block; flex:1; height:10px; background:var(--surface-2); border-radius:6px; overflow:hidden; }
  .box-fill { display:block; height:100%; border-radius:6px; min-width:0; transition:width .35s ease; }
  .box-n { width:24px; text-align:right; font-size:12.5px; color:var(--ink-3); font-variant-numeric:tabular-nums; }

  #tooltip { position:fixed; pointer-events:none; background:var(--ink-1); color:var(--frame); padding:6px 10px;
    border-radius:8px; font-size:12px; font-weight:600; opacity:0; transition:opacity .1s; z-index:60; white-space:nowrap;
    box-shadow:0 6px 18px rgba(0,0,0,.2); }

  @media (max-width:1040px) {
    .grid-learn,.grid-prog { grid-template-columns:1fr; }
    .stat-grid.four { grid-template-columns:repeat(2,1fr); }
    .game-grid { grid-template-columns:repeat(2,1fr); }
    .hero-art { display:none; } .hero-text { max-width:100%; }
  }

  /* ---------- Settings ---------- */

<script>
"use strict";
const $ = (s,r=document)=>r.querySelector(s);
const api = {
  async status(){ try{ return await (await fetch("/api/status")).json(); }catch{ return {busy:false}; } },
  async deck(){ return (await (await fetch("/api/deck")).json()).words || []; },
  async packs(){ try{ return (await (await fetch("/api/packs")).json())||[]; }catch{ return []; } },
  async pack(id){ try{ return await (await fetch("/api/pack?id="+encodeURIComponent(id))).json(); }catch{ return null; } },
  async state(){ return await (await fetch("/api/state")).json(); },
  async save(s){ try{ await fetch("/api/state",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(s)}); }catch{} },
  async keep(gen){ try{ await fetch("/api/keep",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({gen})}); }catch{} },
  async ackUpdate(){ try{ await fetch("/api/update",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ack:true})}); }catch{} },
  async checkUpdate(){ try{ await fetch("/api/check-update",{method:"POST"}); }catch{} },
  async settings(){ try{ return await (await fetch("/api/settings")).json(); }catch{ return {}; } },
  async saveSettings(patch){ try{ return await (await fetch("/api/settings",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(patch)})).json(); }catch{ return null; } },
  async sync(){ try{ return await (await fetch("/api/sync")).json(); }catch{ return {enabled:false}; } },
  async setSync(dir){ try{ return await (await fetch("/api/sync",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({dir})})).json(); }catch{ return {ok:false,error:"Network error"}; } },
  async openSocial(site){ try{ return await (await fetch("/api/social/open?site="+encodeURIComponent(site))).json(); }catch{ return null; } },
  async snooze(hours){ try{ return await (await fetch("/api/snooze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({hours})})).json(); }catch{ return null; } },
};
let SETTINGS = {};
const todayStr = ()=> new Date().toISOString().slice(0,10);
const shuffle = a=>{ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const escHtml = s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
// Say a word aloud. We prefer the clearer Google Translate voice, streamed as
// MP3 through our own /api/tts proxy (no CORS, proper User-Agent, server-cached).
// `lang` is a short pack code (en/nl/de). If the network/proxy is unavailable we
// fall back to the OS speech-synthesis voice (speakLocal), so it still works
// offline. `btn` is lit while it plays, if provided.
let curAudio = null;
function speak(text, btn, lang){
  if(!text) return;
  const code = lang || "en";
  const lit = on => { if(btn) btn.classList.toggle("speaking", on); };
  try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){}
  try{ if(curAudio){ curAudio.pause(); curAudio=null; } }catch(e){}
  let handled=false;
  const fallback = ()=>{ if(handled) return; handled=true; lit(false); speakLocal(text, btn, code); };
  try{
    const a = new Audio(`/api/tts?lang=${encodeURIComponent(code)}&text=${encodeURIComponent(text)}`);
    curAudio = a;
    lit(true);
    a.onended = ()=>{ handled=true; lit(false); if(curAudio===a) curAudio=null; };
    a.onerror = fallback;
    a.play().catch(fallback);   // autoplay blocked / load failed -> OS voice
  }catch(e){ fallback(); }
}
// Offline fallback: the OS's built-in voices (Web Speech API). A Dutch word is
// read by a Dutch voice when one is installed, else the engine's best match.
const SPEAK_LANG = { en:"en-US", nl:"nl-NL", de:"de-DE" };
let VOICES = [];
function loadVoices(){ try{ VOICES = window.speechSynthesis.getVoices() || []; }catch(e){ VOICES = []; } }
if(window.speechSynthesis){
  loadVoices();
  try{ window.speechSynthesis.onvoiceschanged = loadVoices; }catch(e){}
}
function pickVoice(bcp47){
  if(!VOICES.length) loadVoices();
  const tag=bcp47.toLowerCase(), primary=tag.split("-")[0];
  return VOICES.find(v=>(v.lang||"").toLowerCase()===tag)                       // exact (nl-NL)
      || VOICES.find(v=>(v.lang||"").toLowerCase().split("-")[0]===primary)     // primary (nl)
      || null;
}
function speakLocal(text, btn, lang){
  try{
    const synth=window.speechSynthesis;
    if(!synth || !text) return;
    synth.cancel();                       // stop any in-flight utterance first
    const u=new SpeechSynthesisUtterance(String(text));
    u.lang = SPEAK_LANG[lang] || lang || "en-US";
    u.rate = .9;
    const v = pickVoice(u.lang);
    if(v) u.voice = v;                     // force the matching voice when we have one
    if(btn){ btn.classList.add("speaking"); u.onend=u.onerror=()=>btn.classList.remove("speaking"); }
    synth.speak(u);
  }catch(e){}
}
// A small round speaker button that reads a word aloud, reused across the word
// games. `id` must be unique within the mounted game so wireSay can find it.
function sayBtn(id){ return `<button class="say say-sm" id="${id}" type="button" title="Hear pronunciation" aria-label="Hear pronunciation">${I.volume}</button>`; }
function wireSay(host, id, word, lang){ const b=$("#"+id, host); if(b) b.onclick=(e)=>{ e.stopPropagation(); speak(word, b, lang); }; }

// Shared word-game header pieces so every game reads the same way:
// a short uppercase instruction eyebrow, then one meta strip (language · part of
// speech · 🔊 · 🖼️). The 🔊/🖼️ icons render only when sayId/imgId are given —
// i.e. when the word is already on screen (Quiz, and every game's reveal), so
// they never spoil a word still being guessed.
function gameHead(eyebrow){ return `<div class="game-eyebrow">${escHtml(eyebrow)}</div>`; }
function gameMeta({lang, pos, sayId, imgId, hasImg}){
  const parts=[];
  if(pos) parts.push(`<span class="pos" style="font-style:italic;color:var(--ink-3)">${escHtml(pos)}</span>`);
  if(lang!==undefined) parts.push(langBadge(lang));
  if(sayId) parts.push(sayBtn(sayId));
  if(imgId) parts.push(imgAddBtn(imgId, !!hasImg));
  return `<div class="game-meta">${parts.join("")}</div>`;
}

// Word images — an optional per-word picture, shown as a visual memory aid only
// where the word is already visible: flashcard front, quiz prompt, game reveals.
// imgSlot() drops a stable placeholder; fillWordImage() fills it from the word's
// own `img` URL (set by hand in the word editor — any source). No auto-fetch: a
// word shows a picture only if you gave it one, so it's always relevant.
function imgSlot(id, cls){ return `<div class="word-img-slot ${cls||""}" id="${id}"></div>`; }
function fillWordImage(host, id, rec){
  const slot=$("#"+id, host); if(!slot || !rec || !rec.img) return;
  slot.innerHTML=`<figure class="word-img-fig"><img class="word-img" src="${escHtml(rec.img)}" alt="" loading="lazy" onerror="this.closest('.word-img-fig').remove()"></figure>`;
}
// A small round "add / change picture" button, placed next to the word wherever
// a word is shown. Tapping it opens a popup to paste an image URL for that word.
function imgAddBtn(id, has){ return `<button class="say say-sm imgadd${has?' has':''}" id="${id}" type="button" title="${has?'Change':'Add'} a picture" aria-label="${has?'Change':'Add'} a picture">${I.image}</button>`; }
// Persist a per-word image URL onto the live deck record (rec is a reference into
// DECK), then save. Passing "" clears it.
function setWordImg(rec, url){
  url=(url||"").trim(); rec.img=url;
  const d=DECK.find(x=>x.word===rec.word && (x.lang||"")===(rec.lang||""));
  if(d) d.img=url;
  save();
}
// Wire an imgAddBtn: opens the picture popup for `rec`; on save it persists and
// refreshes both the button state and (if given) the word's image slot in-place.
function wireAddImg(host, btnId, rec, slotId){
  const b=$("#"+btnId, host); if(!b) return;
  b.onclick=(e)=>{ e.stopPropagation();
    openImgDialog(rec, ()=>{
      b.classList.toggle("has", !!rec.img);
      b.title=(rec.img?"Change":"Add")+" a picture";
      if(slotId){ const s=$("#"+slotId, host); if(s){ s.innerHTML=""; fillWordImage(host, slotId, rec); } }
    });
  };
}
// Auto-advance to the next round is routed through here so the picture popup can
// hold it open while you paste a URL, instead of the reveal jumping away.
let advanceT=null, advanceFn=null;
function scheduleAdvance(fn, ms){ advanceFn=fn; clearTimeout(advanceT); advanceT=setTimeout(()=>{ advanceFn=null; fn(); }, ms); }
// A centered popup to set / change / remove a word's picture URL, with a live
// preview. Pauses any pending auto-advance while open and resumes it on close.
function openImgDialog(rec, onSaved){
  const old=$("#imgDlg"); if(old) old.remove();
  clearTimeout(advanceT);                        // hold the auto-advance while open
  const pending=advanceFn; advanceFn=null;
  const wrap=document.createElement("div"); wrap.id="imgDlg"; wrap.className="modal-back";
  wrap.innerHTML=`<div class="modal">
      <div class="modal-h">Picture for “${escHtml(rec.word)}”</div>
      <p class="modal-sub">Paste an image URL from anywhere — it shows as a memory aid whenever this word comes up.</p>
      <input class="finput" id="imgDlgUrl" type="text" autocomplete="off" spellcheck="false" placeholder="https://…" value="${escHtml(rec.img||"")}">
      <div id="imgDlgPrev" class="modal-prev"></div>
      <div class="modal-row">
        ${rec.img?`<button class="btn ghost danger" id="imgDlgRemove">Remove</button>`:""}
        <button class="btn ghost" id="imgDlgCancel">Cancel</button>
        <button class="btn primary" id="imgDlgSave">Save</button>
      </div></div>`;
  document.body.appendChild(wrap);
  const url=$("#imgDlgUrl",wrap), prev=$("#imgDlgPrev",wrap);
  const showPrev=()=>{ const v=url.value.trim(); prev.innerHTML=v?`<img src="${escHtml(v)}" alt="" onerror="this.style.display='none'">`:""; };
  showPrev(); url.addEventListener("input", showPrev);
  const close=()=>{ wrap.remove(); document.removeEventListener("keydown", onKey, true);
    if(pending) scheduleAdvance(pending, 1500); };   // resume, leaving time to see the result
  const commit=val=>{ setWordImg(rec, val); if(onSaved) onSaved(); close(); };
  const onKey=e=>{ if(e.key==="Escape"){ e.preventDefault(); close(); }
    else if(e.key==="Enter" && e.target===url){ e.preventDefault(); commit(url.value); } };
  document.addEventListener("keydown", onKey, true);
  wrap.onclick=e=>{ if(e.target===wrap) close(); };
  $("#imgDlgSave",wrap).onclick=()=>commit(url.value);
  $("#imgDlgCancel",wrap).onclick=close;
  const rm=$("#imgDlgRemove",wrap); if(rm) rm.onclick=()=>commit("");
  setTimeout(()=>url.focus(), 30);
}

function mapWord(c){ return {word:c.word,pos:c.pos,def:c.definition,ex:c.example,distractors:(c.distractors||[]).slice(),lang:c.lang||"",img:c.img||""}; }
// The language a word belongs to (untagged words are the English starter deck).
const LANG_NAME = { en:"English", nl:"Dutch", de:"German" };
// A small pill naming the word's language — shown everywhere a word appears.
function langBadge(lang){ const c=LANG_NAME[lang]?lang:"en"; return `<span class="lang-badge lang-${c}">${LANG_NAME[c]}</span>`; }
// All deck edits go through here: swap in the new list, keep DECK pointed at it,
// and persist. STATE.deck is a list, so the server's deep_merge replaces it
// wholesale — add / edit / delete all round-trip cleanly.
function commitDeck(list){ STATE.deck=list; DECK=STATE.deck; save(); }

function ensureWord(w){ if(!STATE.words[w]) STATE.words[w]={box:1,seen:0,correct:0}; return STATE.words[w]; }
function recordDay(){
  const d=todayStr();
  if(STATE.lastDay!==d){
    const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
    STATE.streak=(STATE.lastDay===yest)?(STATE.streak||0)+1:1; STATE.lastDay=d;
  }
  let h=(STATE.history||[]).find(e=>e.day===d);
  if(!h){ h={day:d,reviews:0}; STATE.history.push(h); }
  h.reviews++; STATE.reviews=(STATE.reviews||0)+1; STATE.history=STATE.history.slice(-30);
}
function review(word,correct){
  const w=ensureWord(word); w.seen++;
  if(correct){ w.correct++; w.box=Math.min(5,w.box+1); } else { w.box=1; }
  recordDay(); save(); updateChrome();
}
let saveT=null;
function save(){ clearTimeout(saveT); saveT=setTimeout(()=>api.save(STATE),250); }
function updateChrome(){ $("#streak-chip").textContent = STATE?.streak||0; }

function pickWeighted(){
  const pool=[];
  DECK.forEach(c=>{ const box=(STATE.words[c.word]?.box)||1; const wgt=6-box; for(let i=0;i<wgt;i++) pool.push(c); });
  return pool[Math.floor(Math.random()*pool.length)] || DECK[0];
}
function computeStats(){
  const words=STATE.words||{};
  // Count progress only for words still in the deck — a deleted or renamed word
  // leaves its old STATE.words entry behind (deep_merge never prunes keys), and
  // it shouldn't skew mastery, accuracy, or the box breakdown.
  const recs=DECK.map(w=>words[w.word]).filter(Boolean);
  const mastered=recs.filter(w=>w.box>=5).length;
  const learning=recs.length;
  const seen=recs.reduce((a,w)=>a+(w.seen||0),0);
  const corr=recs.reduce((a,w)=>a+(w.correct||0),0);
  const acc=seen?Math.round(100*corr/seen):0;
  const boxCounts=[1,2,3,4,5].map(b=>recs.filter(w=>w.box===b).length);
  const days=[]; for(let i=6;i>=0;i--){ const d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);
    const h=(STATE.history||[]).find(e=>e.day===d); days.push({day:d,n:h?h.reviews:0}); }
  const masteryPct = DECK.length? mastered/DECK.length : 0;
  return {mastered,learning,seen,acc,boxCounts,days,streak:STATE.streak||0,reviews:STATE.reviews||0,masteryPct};
}

async function addPack(p,card){
  const msg=card.querySelector("[data-msg]");
  msg.innerHTML=`<span class="pc-loading">Adding…</span>`;
  const full=await api.pack(p.id);
  const words=(full&&full.words)||[];
  if(!words.length){ msg.innerHTML=`<span class="no">Couldn’t load this pack.</span>`; return; }
  const lang=full.lang||"";               // every word in a pack shares its language
  const have=new Set(DECK.map(w=>w.word.toLowerCase()));
  const add=[];
  words.map(mapWord).forEach(w=>{ if(lang) w.lang=lang; const k=w.word.toLowerCase(); if(!have.has(k)){ have.add(k); add.push(w); } });
  if(add.length){
    commitDeck(DECK.concat(add));
    const dup=words.length-add.length;
    msg.innerHTML=`<span class="yes">Added ${add.length} word${add.length===1?'':'s'}${dup?` · ${dup} already in your deck`:""}.</span>`;
  } else {
    msg.innerHTML=`<span class="pc-dim">All ${words.length} words are already in your deck.</span>`;
  }
}

function saveWordEditor(host){
  const word=$("#fWord",host).value.trim();
  const pos=$("#fPos",host).value.trim();
  const def=$("#fDef",host).value.trim();
  const ex=$("#fEx",host).value.trim();
  const lang=($("#fLang",host)||{}).value||"en";
  const img=$("#fImg",host).value.trim();
  const distractors=["fD0","fD1","fD2"].map(id=>$("#"+id,host).value.trim()).filter(Boolean);
  const msg=$("#fMsg",host);
  const fail=t=>{ msg.innerHTML=`<span class="no">${escHtml(t)}</span>`; };
  if(!word){ fail("Enter a word."); $("#fWord",host).focus(); return; }
  if(!def){ fail("Enter a definition."); $("#fDef",host).focus(); return; }
  const key=word.toLowerCase(), editing=wordsEdit.mode==="edit", origKey=editing?wordsEdit.key:null;
  if(DECK.some(w=>w.word.toLowerCase()===key && w.word.toLowerCase()!==origKey)){ fail(`“${word}” is already in your deck.`); return; }
  const rec={word,pos,def,ex,distractors,lang,img};
  const next=DECK.slice();
  if(editing){
    const idx=next.findIndex(w=>w.word.toLowerCase()===origKey);
    if(idx<0) next.push(rec);
    else {
      const oldWord=next[idx].word;
      next[idx]=rec;
      if(oldWord!==word && STATE.words[oldWord] && !STATE.words[word]) STATE.words[word]=STATE.words[oldWord];
    }
  } else next.push(rec);
  commitDeck(next);
  wordsEdit=null; refreshWords();
}

function mountQuiz(host){
  const c=pickWeighted();
  // Draw decoys from OTHER words' real definitions so every option reads like a
  // genuine, similarly-detailed definition. The curated `distractors` tend to be
  // short one-liners, which made the correct (fuller) definition obvious by
  // length alone — so prefer real defs and fall back to distractors only when the
  // deck is too small to fill three choices.
  let ds=[];
  for(const d of shuffle(DECK)){
    if(ds.length>=3) break;
    if(d.word!==c.word && d.def && d.def!==c.def && !ds.includes(d.def)) ds.push(d.def);
  }
  if(ds.length<3){
    for(const d of (c.distractors||[])){
      if(ds.length>=3) break;
      if(d && d!==c.def && !ds.includes(d)) ds.push(d);
    }
  }
  const opts=shuffle([{t:c.def,ok:true}, ...ds.slice(0,3).map(d=>({t:d,ok:false}))]);
  host.innerHTML=`<div class="center">
      ${gameHead("PICK THE MEANING")}
      <div class="game-prompt">${escHtml(c.word)}</div>
      ${gameMeta({lang:c.lang, pos:c.pos, sayId:"qsay", imgId:"qimgbtn", hasImg:c.img})}
      ${imgSlot("qImg","sm")}
      <div id="opts"></div>
      <div class="msg" id="qmsg"></div></div>`;
  wireSay(host,"qsay",c.word,c.lang);
  fillWordImage(host,"qImg",c);
  wireAddImg(host,"qimgbtn",c,"qImg");
  const box=$("#opts",host);
  opts.forEach((o,i)=>{
    const b=document.createElement("button"); b.className="opt";
    b.innerHTML=`<span class="key">${i+1}</span><span>${escHtml(o.t)}</span>`;
    b.onclick=()=>choose(o,b); box.appendChild(b);
  });
  function choose(o,b){
    box.querySelectorAll(".opt").forEach(x=>x.disabled=true);
    if(o.ok){ b.classList.add("correct"); $("#qmsg",host).innerHTML=`<span class="ok">Correct.</span> ${escHtml(c.word)} — ${escHtml(c.def)}`;
      review(c.word,true); bumpGame("quiz","wins"); }
    else { b.classList.add("wrong");
      box.querySelectorAll(".opt").forEach(x=>{ if(x.textContent.includes(c.def)) x.classList.add("correct"); });
      $("#qmsg",host).innerHTML=`<span class="no">Not quite.</span> ${escHtml(c.word)} — ${escHtml(c.def)}`; review(c.word,false); }
    keyHandler=null; scheduleAdvance(()=>mountQuiz(host), o.ok?950:1900);
  }
  keyHandler=(e)=>{ const n=parseInt(e.key); if(n>=1&&n<=opts.length){ const b=box.children[n-1]; if(b&&!b.disabled) b.click(); } };
}

function mountScramble(host){
  keyHandler=null;
  const c=pickWeighted();
  let letters=shuffle(c.word.split("")); if(letters.join("")===c.word&&c.word.length>1)[letters[0],letters[1]]=[letters[1],letters[0]];
  host.innerHTML=`<div class="center">
      ${gameHead("UNSCRAMBLE")}
      <div class="letters" id="sletters">${letters.map(l=>`<span class="lchip">${escHtml(l)}</span>`).join("")}</div>
      <p class="game-clue">${escHtml(c.def)}</p>
      ${gameMeta({lang:c.lang})}
      <div id="sboxes"></div>
      <div class="msg" id="smsg"></div>
      <div class="game-actions">
        <button class="btn ghost" id="sskip">Skip</button>
      </div></div>`;
  const chips=Array.from(host.querySelectorAll("#sletters .lchip"));
  // Dim one scramble chip for each correctly-placed letter typed so far — but
  // only while the typed string stays a correct prefix of the answer, so a wrong
  // keystroke stops the crossing-off (a gentle "you slipped" cue).
  const reflect=typed=>{
    typed=(typed||"").toLowerCase();
    let n=0; while(n<typed.length && n<c.word.length && typed[n]===c.word[n].toLowerCase()) n++;
    chips.forEach(ch=>ch.classList.remove("used"));
    for(let k=0;k<n;k++){
      const chip=chips.find(ch=>!ch.classList.contains("used") && ch.textContent.toLowerCase()===c.word[k].toLowerCase());
      if(chip) chip.classList.add("used");
    }
  };
  letterInputs(host,"sboxes",c.word,{
    onType:reflect,
    onWin:()=>{
      $("#smsg",host).innerHTML=`<div><span class="ok">${I.checkmini} ${escHtml(c.word.toUpperCase())}</span> ${sayBtn("ssay")}${imgAddBtn("simgbtn",!!c.img)}</div>${imgSlot("simg","sm")}`;
      wireSay(host,"ssay",c.word,c.lang); speak(c.word,$("#ssay",host),c.lang); fillWordImage(host,"simg",c); wireAddImg(host,"simgbtn",c,"simg");   // hear + see it once solved
      review(c.word,true); bumpGame("scramble","wins"); scheduleAdvance(()=>mountScramble(host),1400);
    },
    onMiss:()=>{ $("#smsg",host).innerHTML=`<span class="no">Not quite — the green letters stay, retype the rest.</span>`; }
  });
  $("#sskip",host).onclick=()=>{ review(c.word,false); mountScramble(host); };
}

function mountHangman(host){
  const c=pickWeighted(); const word=c.word.toLowerCase(); const MAX=7;
  let guessed=new Set(), wrong=0;
  const draw=()=>{
    const shown=word.split("").map(ch=>ch===" "?"·":(guessed.has(ch)?ch:"_")).join(" ");
    const won=word.split("").every(ch=>ch===" "||guessed.has(ch)); const lost=wrong>=MAX;
    // Missed letters kept visible so you can see what you've already tried —
    // the on-screen keyboard is gone; you type on the real keyboard.
    const missed=[...guessed].filter(l=>!word.includes(l)).sort();
    host.innerHTML=`<div class="center">
      ${gameHead("GUESS THE WORD")}
      <div class="game-clue"><em>${escHtml(c.def)}</em></div>
      ${gameMeta({lang:c.lang})}
      <div class="hangman-word">${escHtml(shown)}</div>
      <div class="dots">${Array.from({length:MAX},(_,i)=>`<span class="life ${i<wrong?'gone':''}"></span>`).join("")}</div>
      <div class="wrong-strip">${missed.map(l=>`<span class="wrong-chip">${escHtml(l)}</span>`).join("")}</div>
      <div class="game-clue">Type a letter to guess.</div>
      <div class="msg center" id="hmsg"></div></div>`;
    if(won){ $("#hmsg",host).innerHTML=`<div><span class="ok">Nice — you got it.</span> ${sayBtn("hsay")}${imgAddBtn("himgbtn",!!c.img)}</div>${imgSlot("himg","sm")}`; wireSay(host,"hsay",c.word,c.lang); speak(c.word,$("#hsay",host),c.lang); fillWordImage(host,"himg",c); wireAddImg(host,"himgbtn",c,"himg"); review(c.word,true); bumpGame("hangman","wins"); keyHandler=null; scheduleAdvance(()=>mountHangman(host),1900); return; }
    if(lost){ $("#hmsg",host).innerHTML=`<div><span class="no">The word was “${escHtml(word)}”.</span> ${sayBtn("hsay")}${imgAddBtn("himgbtn",!!c.img)}</div>${imgSlot("himg","sm")}`; wireSay(host,"hsay",c.word,c.lang); speak(c.word,$("#hsay",host),c.lang); fillWordImage(host,"himg",c); wireAddImg(host,"himgbtn",c,"himg"); review(c.word,false); keyHandler=null; scheduleAdvance(()=>mountHangman(host),2400); return; }
  };
  draw();
  keyHandler=(e)=>{ const l=e.key.toLowerCase(); if(/^[a-z]$/.test(l)&&!guessed.has(l)){ guessed.add(l); if(!word.includes(l)) wrong++; draw(); } };
}

function mountWordle(host){
  const c=pickWeighted(); const word=c.word.toLowerCase().replace(/[^a-z]/g,""); const N=word.length, MAX=6;
  let rows=[], current="", done=false;
  // A fully-submitted guess, graded into hit / near / miss cells.
  const gradedRow=g=>{
    const wrap=document.createElement("div"); wrap.className="grid-guess";
    const counts={}; for(const ch of word) counts[ch]=(counts[ch]||0)+1;
    const cls=Array(N).fill("miss");
    for(let i=0;i<N;i++){ if(g[i]===word[i]){cls[i]="hit"; counts[g[i]]--;} }
    for(let i=0;i<N;i++){ if(cls[i]==="hit")continue; if(counts[g[i]]>0){cls[i]="near";counts[g[i]]--;} }
    for(let i=0;i<N;i++){ const d=document.createElement("div"); d.className="gcell "+cls[i]; d.textContent=g[i]||""; wrap.appendChild(d); }
    return wrap;
  };
  // The row you're typing into now (filled cells + a caret on the next slot).
  const activeRow=()=>{
    const wrap=document.createElement("div"); wrap.className="grid-guess";
    for(let i=0;i<N;i++){ const d=document.createElement("div");
      d.className="gcell"+(i<current.length?" filled":"")+((!done && i===current.length)?" active":"");
      d.textContent=current[i]||""; wrap.appendChild(d); }
    return wrap;
  };
  const emptyRow=()=>{ const wrap=document.createElement("div"); wrap.className="grid-guess";
    for(let i=0;i<N;i++){ const d=document.createElement("div"); d.className="gcell"; wrap.appendChild(d); } return wrap; };
  const render=()=>{
    host.innerHTML=`<div class="center">
      ${gameHead("CRACK THE WORD")}
      <div class="game-clue">${N}-letter word · <em>${escHtml(c.def)}</em></div>
      ${gameMeta({lang:c.lang})}
      <div id="grid" style="margin:16px 0"></div>
      ${done?"":`<div class="game-clue">Type letters · Enter to submit.</div>`}
      <div class="msg" id="wmsg"></div></div>`;
    const grid=$("#grid",host);
    rows.forEach(g=>grid.appendChild(gradedRow(g)));
    if(!done){ grid.appendChild(activeRow()); for(let r=rows.length+1;r<MAX;r++) grid.appendChild(emptyRow()); }
  };
  const submit=()=>{
    if(current.length!==N){ $("#wmsg",host).innerHTML=`<span class="no">Needs ${N} letters.</span>`; return; }
    const g=current; rows.push(g); current="";
    if(g===word){ done=true; render(); $("#wmsg",host).innerHTML=`<div><span class="ok">Solved in ${rows.length}.</span> ${sayBtn("wsay")}${imgAddBtn("wimgbtn",!!c.img)}</div>${imgSlot("wimg","sm")}`;
      wireSay(host,"wsay",c.word,c.lang); speak(c.word,$("#wsay",host),c.lang); fillWordImage(host,"wimg",c); wireAddImg(host,"wimgbtn",c,"wimg");
      review(c.word,true); bumpGame("wordle","wins"); bumpGame("wordle","best",MAX-rows.length+1); keyHandler=null; scheduleAdvance(()=>mountWordle(host),2000); return; }
    if(rows.length>=MAX){ done=true; render(); $("#wmsg",host).innerHTML=`<div><span class="no">It was “${word}”.</span> ${sayBtn("wsay")}${imgAddBtn("wimgbtn",!!c.img)}</div>${imgSlot("wimg","sm")}`; wireSay(host,"wsay",c.word,c.lang); speak(c.word,$("#wsay",host),c.lang); fillWordImage(host,"wimg",c); wireAddImg(host,"wimgbtn",c,"wimg"); review(c.word,false); keyHandler=null; scheduleAdvance(()=>mountWordle(host),2600); return; }
    render();
  };
  render();
  // No text input — you type straight into the grid (physical keyboard).
  keyHandler=(e)=>{
    if(done) return;
    if(e.key==="Enter"){ e.preventDefault(); submit(); return; }
    if(e.key==="Backspace"){ e.preventDefault(); if(current.length){ current=current.slice(0,-1); render(); } return; }
    const l=e.key.toLowerCase();
    if(/^[a-z]$/.test(l) && current.length<N){ current+=l; render(); }
  };
}

// A row of single-character boxes — one per letter of `answer`. Focus
// auto-advances as you type and Backspace walks back; when every box is filled
// we evaluate and flip each box green/red one at a time (the reveal). All correct
// → opts.onWin(); otherwise the wrong boxes clear for another try, the correct
// ones lock green, and opts.onMiss() fires. Spaces / hyphens become fixed
// separators so multi-word and hyphenated answers still line up. opts.onType(cur)
// fires on every keystroke with the current string (used by Scramble's chips).
function letterInputs(host, slotId, answer, opts){
  opts=opts||{};
  const slot=$("#"+slotId,host); if(!slot) return null;
  const chars=[...answer];
  const isL=ch=>/[A-Za-zÀ-ɏ]/.test(ch);
  slot.className="lboxes";
  slot.innerHTML=chars.map((ch,i)=> isL(ch)
      ? `<input class="lbox" data-i="${i}" maxlength="1" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="letter ${i+1}">`
      : (ch.trim()==="" ? `<span class="lbox-space"></span>` : `<span class="lbox-sep">${escHtml(ch)}</span>`)
    ).join("");
  const boxes=Array.from(slot.querySelectorAll(".lbox"));
  if(!boxes.length) return null;
  const norm=s=>(s||"").toLowerCase();
  const at=b=>boxes.indexOf(b);
  const cur=()=>{ const m={}; boxes.forEach(b=>m[+b.dataset.i]=b.value);
    return chars.map((ch,i)=> isL(ch)?(m[i]||""):ch).join(""); };
  const firstEmpty=()=>boxes.find(b=>!b.disabled && !b.value);
  const evaluate=()=>{
    boxes.forEach(b=>b.disabled=true);
    let allOk=true;
    boxes.forEach((b,k)=>{ const ok=norm(b.value)===norm(chars[+b.dataset.i]); if(!ok)allOk=false;
      setTimeout(()=>{ b.classList.remove("lock"); b.classList.add(ok?"ok":"bad"); }, k*110); });
    const after=boxes.length*110+300;
    if(allOk){ setTimeout(()=>opts.onWin&&opts.onWin(), after); return; }
    setTimeout(()=>{
      boxes.forEach(b=>{ const ok=norm(b.value)===norm(chars[+b.dataset.i]);
        if(ok){ b.classList.remove("ok","bad"); b.classList.add("lock"); b.disabled=true; }
        else { b.value=""; b.classList.remove("ok","bad"); b.disabled=false; } });
      if(opts.onType) opts.onType(cur());
      if(opts.onMiss) opts.onMiss();
      const fe=firstEmpty(); if(fe) fe.focus();
    }, after+540);
  };
  const maybeFull=()=>{ if(boxes.every(b=>b.disabled || b.value.trim()!=="")) evaluate(); };
  boxes.forEach(b=>{
    b.addEventListener("input",()=>{
      b.value=b.value.replace(/[^A-Za-zÀ-ɏ]/g,"").slice(0,1);
      if(b.value){ const nx=boxes[at(b)+1]; if(nx&&!nx.disabled) nx.focus(); }
      if(opts.onType) opts.onType(cur());
      maybeFull();
    });
    b.addEventListener("keydown",e=>{
      if(e.key==="Backspace" && !b.value){ const pv=boxes[at(b)-1]; if(pv){ e.preventDefault(); pv.focus(); pv.value=""; if(opts.onType) opts.onType(cur()); } }
      else if(e.key==="ArrowLeft"){ e.preventDefault(); const pv=boxes[at(b)-1]; if(pv) pv.focus(); }
      else if(e.key==="ArrowRight"){ e.preventDefault(); const nx=boxes[at(b)+1]; if(nx) nx.focus(); }
      else if(e.key==="Enter"){ e.preventDefault(); maybeFull(); }
    });
  });
  setTimeout(()=>boxes[0].focus(),30);
  return { focus:()=>boxes[0].focus(), value:cur };
}

// Shared success reveal for the type-in word games (Context Gap, Dictation,
// Recall): confirm the word, speak it, show its picture, credit the win, then
// queue the next round. Mirrors the reveal used by Scramble/Wordle.
function typeWin(host, c, msgSel, gameId, remount){
  $(msgSel,host).innerHTML=`<div><span class="ok">${I.checkmini} ${escHtml(c.word.toUpperCase())}</span> ${sayBtn("twsay")}${imgAddBtn("twimgbtn",!!c.img)}</div>${imgSlot("twimg","sm")}`;
  wireSay(host,"twsay",c.word,c.lang); speak(c.word,$("#twsay",host),c.lang); fillWordImage(host,"twimg",c); wireAddImg(host,"twimgbtn",c,"twimg");
  review(c.word,true); bumpGame(gameId,"wins"); keyHandler=null; scheduleAdvance(remount,1500);
}

// Context Gap — a cloze: blank the word out of its own example sentence and have
// the user type it back. Productive recall + real context, the strongest fit for
// the evidence on vocabulary retention. Needs an example that contains the word.
function mountCloze(host){
  keyHandler=null;
  const rx=w=>new RegExp("\\b"+w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
  let c=null, m=null;
  for(let i=0;i<40 && !c;i++){ const cand=pickWeighted(); if(cand.ex){ const mm=cand.ex.match(rx(cand.word)); if(mm){ c=cand; m=mm; } } }
  if(!c){ const any=DECK.find(d=>d.ex && rx(d.word).test(d.ex)); if(any){ c=any; m=any.ex.match(rx(any.word)); } }
  if(!c){
    host.innerHTML=`<div class="center"><p class="muted" style="max-width:440px;margin:26px auto">Context Gap needs words with an example sentence. Add an example to a few words (Words ▸ edit) and come back.</p></div>`;
    return;
  }
  const idx=m.index, hit=m[0];
  const blank=`<span class="cloze-blank">${"_".repeat(Math.max(4,hit.length))}</span>`;
  const sentence=escHtml(c.ex.slice(0,idx))+blank+escHtml(c.ex.slice(idx+hit.length));
  host.innerHTML=`<div class="center">
      ${gameHead("FILL THE GAP")}
      <p class="cloze-sent">${sentence}</p>
      ${c.def?`<p class="game-clue"><em>${escHtml(c.def)}</em></p>`:""}
      ${gameMeta({lang:c.lang})}
      <div id="cboxes"></div>
      <div class="msg" id="cmsg"></div>
      <div class="game-actions">
        <button class="btn ghost" id="cskip">Skip</button>
      </div></div>`;
  letterInputs(host,"cboxes",hit,{   // the exact form blanked from the sentence
    onWin:()=>typeWin(host,c,"#cmsg","cloze",()=>mountCloze(host)),
    onMiss:()=>{ $("#cmsg",host).innerHTML=`<span class="no">Not quite — try the red letters again.</span>`; }
  });
  $("#cskip",host).onclick=()=>{ review(c.word,false); mountCloze(host); };
}

// Dictation — hear the word (TTS) and type what you hear. Productive spelling
// recall + audio; the definition is shown as a light hint to disambiguate.
function mountDictate(host){
  keyHandler=null;
  const c=pickWeighted();
  host.innerHTML=`<div class="center">
      ${gameHead("LISTEN & TYPE")}
      <button class="say say-lg" id="dsay" type="button" title="Play again" aria-label="Play again">${I.volume}</button>
      ${c.def?`<p class="game-clue"><em>${escHtml(c.def)}</em></p>`:""}
      ${gameMeta({lang:c.lang})}
      <div id="dboxes"></div>
      <div class="msg" id="dmsg"></div>
      <div class="game-actions">
        <button class="btn ghost" id="dskip">Skip</button>
      </div></div>`;
  wireSay(host,"dsay",c.word,c.lang);
  speak(c.word,$("#dsay",host),c.lang);      // play once on mount
  letterInputs(host,"dboxes",c.word,{
    onWin:()=>typeWin(host,c,"#dmsg","dictate",()=>mountDictate(host)),
    onMiss:()=>{ $("#dmsg",host).innerHTML=`<span class="no">Not quite — listen again and fix the red letters.</span>`; }
  });
  $("#dskip",host).onclick=()=>{ review(c.word,false); mountDictate(host); };
}

// Recall — the hardest, strongest retrieval form: shown the definition, produce
// the word by typing it. A first-letter + length nudge appears after a miss.
function mountRecall(host){
  keyHandler=null;
  const c=pickWeighted();
  host.innerHTML=`<div class="center">
      ${gameHead("NAME THE WORD")}
      <p class="game-prompt text">${escHtml(c.def)}</p>
      ${gameMeta({lang:c.lang, pos:c.pos})}
      <div id="rboxes"></div>
      <div class="msg" id="rmsg"></div>
      <div class="game-actions">
        <button class="btn ghost" id="rskip">Reveal</button>
      </div></div>`;
  letterInputs(host,"rboxes",c.word,{
    onWin:()=>typeWin(host,c,"#rmsg","recall",()=>mountRecall(host)),
    onMiss:()=>{ $("#rmsg",host).innerHTML=`<span class="no">Not quite — the green letters are right.</span>`; }
  });
  $("#rskip",host).onclick=()=>{ $("#rmsg",host).innerHTML=`<div><span class="no">It was “${escHtml(c.word)}”.</span> ${imgAddBtn("rimgbtn",!!c.img)}</div>${imgSlot("rimg","sm")}`; wireAddImg(host,"rimgbtn",c,"rimg"); review(c.word,false); keyHandler=null; scheduleAdvance(()=>mountRecall(host),1600); };
}

/* ---------------- PROGRESS ---------------- */
function gaugeSVG(pct){
  const cx=118,cy=118,r=88, C=2*Math.PI*r, off=C*(1-pct);
  let ticks=""; const TN=56;
  for(let i=0;i<TN;i++){ const a=(i/TN)*2*Math.PI - Math.PI/2;
    const x1=cx+100*Math.cos(a), y1=cy+100*Math.sin(a), x2=cx+107*Math.cos(a), y2=cy+107*Math.sin(a);
    const on=(i/TN)<=pct;
    ticks+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${on?'var(--violet)':'var(--line)'}" stroke-width="2.4" stroke-linecap="round"/>`;
  }
  return `<svg class="gauge" viewBox="0 0 236 236">
    <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8A5EF2"/><stop offset="1" stop-color="#F0714B"/></linearGradient></defs>
    ${ticks}
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface-2)" stroke-width="13"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="url(#gg)" stroke-width="13" stroke-linecap="round"
      stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>
    <text x="118" y="112" text-anchor="middle" class="g-val">${Math.round(pct*100)}<tspan class="g-pct">%</tspan></text>
    <text x="118" y="138" text-anchor="middle" class="g-cap">mastered</text>
  </svg>`;
}
function areaChart(days){
  const W=380,H=176, padL=8,padR=10,padT=16,padB=26;
  const max=Math.max(1,...days.map(d=>d.n)); const n=days.length; const iw=W-padL-padR;
  const X=i=> padL + (n===1?iw/2:i*iw/(n-1));
  const Y=v=> padT + (1-(v/max))*(H-padT-padB);
  const pts=days.map((d,i)=>[X(i),Y(d.n)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=`M${pts[0][0].toFixed(1)} ${(H-padB).toFixed(1)} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${pts[n-1][0].toFixed(1)} ${(H-padB).toFixed(1)} Z`;
  const peak=days.reduce((m,d,i)=>d.n>days[m].n?i:m,0);
  const dots=pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${(i===peak&&days[peak].n)?4.5:3}" class="dot ${(i===peak&&days[peak].n)?'peak':''}" data-tip="${days[i].n} review${days[i].n===1?'':'s'} · ${days[i].day}"/>`).join('');
  const labels=days.map((d,i)=>`<text x="${X(i).toFixed(1)}" y="${H-8}" text-anchor="middle" class="ax">${new Date(d.day+'T00:00').toLocaleDateString(undefined,{weekday:'short'}).slice(0,2)}</text>`).join('');
  return `<svg class="area" viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    <defs><linearGradient id="af" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--violet)" stop-opacity=".28"/><stop offset="1" stop-color="var(--violet)" stop-opacity="0"/></linearGradient></defs>
    <line x1="${padL}" y1="${padT}" x2="${W-padR}" y2="${padT}" class="grid"/>
    <path d="${area}" fill="url(#af)"/><path d="${line}" class="aline"/>${dots}${labels}
  </svg>`;
}

  host.innerHTML=`
