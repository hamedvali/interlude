  wireSeg("segScope",  v=>saveSetting({toolScope:v}));

  const rng=$("#rngDelay"), val=$("#valDelay");
  rng.oninput=()=>{ val.textContent=`${rng.value}s`; };
  rng.onchange=()=>saveSetting({openDelay:parseFloat(rng.value)});

  const numW=$("#numW"), numH=$("#numH");
  const clamp=(n,d)=>{ n=parseInt(n); return isNaN(n)?d:Math.max(320,Math.min(4000,n)); };
  numW.onchange=()=>{ numW.value=clamp(numW.value,350); saveSetting({width:parseInt(numW.value)}); };
  numH.onchange=()=>{ numH.value=clamp(numH.value,800); saveSetting({height:parseInt(numH.value)}); };

  $("#swSound").onchange=e=>{ if(e.target.checked) chime(); saveSetting({sound:e.target.checked}); };
  $("#swEnabled").onchange=e=>saveSetting({enabled:e.target.checked});
  $("#swUpdate").onchange=e=>saveSetting({autoUpdate:e.target.checked});
  paintSync();
}

// Fills the Settings "Sync across machines" card. Progress (state.json) can be
// redirected to a shared folder (Dropbox etc.) so two Macs stay in step. On any
// change we reload the page so the SPA re-reads the now-active state and rebuilds
// its in-memory deck — otherwise a stale deck could overwrite adopted progress.
async function paintSync(){
  const box=$("#syncBody"); if(!box) return;
  const st=await api.sync();
  if(st.enabled){
    box.innerHTML=`
      <div class="sync-on">${I.check} Syncing to <code>${escHtml(st.dir)}</code></div>
      ${st.dirExists?"":`<div class="sync-warn">This folder isn’t reachable right now — progress is saving locally until it’s back (is Dropbox running?).</div>`}
      <div class="set-desc">Your deck, streak and stats are saved here. Sign in to the same Dropbox on your other Mac, turn sync on there too, and it’ll pick up this progress.</div>
      <div style="margin-top:12px"><button class="btn ghost" id="syncOff">Turn off sync</button></div>
      <div class="pc-msg" id="syncMsg"></div>`;
    $("#syncOff").onclick=async(e)=>{
      const m=$("#syncMsg"); e.target.disabled=true; m.textContent="Turning off…";
      const r=await api.setSync("");
      if(r&&r.ok){ location.reload(); }
      else { e.target.disabled=false; m.textContent=(r&&r.error)||"Couldn’t turn off sync."; }
    };
  } else {
    box.innerHTML=`
      <div class="set-desc">Save your progress to a <b>Dropbox</b> folder so both laptops share one deck, streak and history. Install Dropbox and sign in with the same account on each Mac, then point Interlude at a folder inside it. (Any synced folder — iCloud, Google Drive — works too.)</div>
      <div class="sync-input">
        <input class="text" id="syncDir" placeholder="~/Dropbox/Interlude" value="${escHtml(st.suggested||"")}" spellcheck="false">
        <button class="btn primary" id="syncOn">Turn on sync</button>
      </div>
      <div class="muted sync-hint">${st.dropboxFound?"Dropbox found on this Mac — the path above is ready to use.":"Tip: install the Dropbox app first, or enter any synced-folder path."}</div>
      <div class="pc-msg" id="syncMsg"></div>`;
    $("#syncOn").onclick=async(e)=>{
      const dir=($("#syncDir").value||"").trim(), m=$("#syncMsg");
      if(!dir){ m.textContent="Enter a folder path."; return; }
      e.target.disabled=true; m.textContent="Setting up…";
      const r=await api.setSync(dir);
      if(r&&r.ok){ location.reload(); }
      else { e.target.disabled=false; m.textContent=(r&&r.error)||"Couldn’t turn on sync."; }
    };
    const inp=$("#syncDir");
    if(inp) inp.onkeydown=(ev)=>{ if(ev.key==="Enter"){ ev.preventDefault(); $("#syncOn").click(); } };
  }
}

/* soft two-note chime when Claude finishes (best-effort; needs audio to be allowed) */
let _actx=null;
function chime(){
  try{
    _actx=_actx||new (window.AudioContext||window.webkitAudioContext)();
    if(_actx.state==="suspended") _actx.resume();
    const t0=_actx.currentTime;
    [[783.99,0],[1046.5,0.12]].forEach(([f,dt])=>{
      const o=_actx.createOscillator(), g=_actx.createGain();
      o.type="sine"; o.frequency.value=f; o.connect(g); g.connect(_actx.destination);
      g.gain.setValueAtTime(0.0001,t0+dt);
      g.gain.exponentialRampToValueAtTime(0.16,t0+dt+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t0+dt+0.3);
      o.start(t0+dt); o.stop(t0+dt+0.32);
    });
  }catch(e){}
}

/* ---------------- SOCIAL ---------------- */
// Instagram / X / TikTok forbid <iframe> embedding (X-Frame-Options / CSP
// frame-ancestors). Inside the native shell (webview.js) we instead ask it to
// overlay a real, top-level web view exactly over #socialStage — a load those
// headers never block — sharing the persistent cookie store so logins stick.
// window.__ilSocial() (below) is what the shell polls to know what/where to show.
// Outside the shell (a plain browser fallback) we can't overlay, so we offer the
// separate-window opener instead.
const NATIVE = !!window.__ilNative;
const SOCIAL = [
  { id:"instagram", name:"Instagram", logo:"ig",
    svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5.4"/><circle cx="12" cy="12" r="4"/><circle cx="17.6" cy="6.4" r="1.15" fill="currentColor" stroke="none"/></svg>` },
  { id:"x", name:"X", logo:"x",
    svg:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 3h3.2l-7 8 8.2 10h-6.4l-5-6.5L4 21H.8l7.5-8.6L0 3h6.6l4.5 6 6.4-6Zm-1.1 16h1.8L7.1 4.7H5.2L16.4 19Z"/></svg>` },
  { id:"tiktok", name:"TikTok", logo:"tt",
    svg:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.1 3c.32 2.28 1.6 3.98 3.9 4.2v2.85c-1.36 0-2.66-.4-3.9-1.13v5.72a5.62 5.62 0 1 1-5.62-5.62c.3 0 .6.02.9.07v2.94a2.72 2.72 0 1 0 1.9 2.6V3h2.92Z"/></svg>` },
];
let socialSite = null;
function socialName(id){ const s=SOCIAL.find(x=>x.id===id); return s?s.name:id; }
function renderSocial(){
  keyHandler=null;
  const tabs = SOCIAL.map(s=>`
    <button class="stab ${socialSite===s.id?"on":""}" data-s="${s.id}">
      <span class="stab-ic ${s.logo}">${s.svg}</span>${s.name}
    </button>`).join("");
  $("#social").innerHTML=`
    <div class="social-head">
      <div class="stabs">${tabs}</div>
      <button class="btn ghost spop" id="sPop" title="Open in a separate window">${I.arrowup} Pop out</button>
    </div>
    <div class="social-stage" id="socialStage"></div>`;
  $("#social").querySelectorAll("[data-s]").forEach(b=>b.onclick=()=>{ socialSite=b.dataset.s; persistNav(); renderSocial(); });
  $("#sPop").onclick=()=>{ if(socialSite) api.openSocial(socialSite); };
  paintStage();
}
function paintStage(){
  const stage=$("#socialStage"); if(!stage) return;
  if(!socialSite){
    stage.innerHTML=`<div class="social-empty">
      <div class="se-ic">${I.window}</div>
      <div class="se-t">Pick a network above</div>
      <div class="se-s">It opens right here while Claude works — and you stay signed in between sessions.</div></div>`;
  } else if(NATIVE){
    stage.innerHTML="";                 // the native overlay fills this area
  } else {
    const nm=socialName(socialSite);
    stage.innerHTML=`<div class="social-empty">
      <div class="se-ic">${I.window}</div>
      <div class="se-t">Opens in its own window</div>
      <div class="se-s">Inline view runs in the Interlude popup. Open ${nm} in a separate signed-in window instead.</div>
      <button class="btn primary" id="sOpenWin">Open ${nm}</button></div>`;
    $("#sOpenWin").onclick=()=>api.openSocial(socialSite);
  }
}
// The native shell polls this ~5x/second to learn which site to embed and the
// exact on-screen rect of #socialStage. Returns '' when we're not on the Social
// page or nothing is selected, which tells the shell to hide the overlay.
window.__ilSocial = function(){
  try{
    const view=document.getElementById("social");
    if(!socialSite || !view || !view.classList.contains("active")) return "";
    const st=document.getElementById("socialStage");
    if(!st) return "";
    const r=st.getBoundingClientRect();
    if(r.width<2 || r.height<2) return "";
    return JSON.stringify({ site:socialSite, visible:true,
      x:Math.round(r.left), y:Math.round(r.top), w:Math.round(r.width), h:Math.round(r.height) });
  }catch(e){ return ""; }
};

/* ---------------- nav + status ---------------- */
const RENDER={ learn:renderLearn, game:renderGame, social:renderSocial, settings:renderSettings };
let curView="learn";
// Remember where the user is — top-level view plus its inner state — so reopening
// the window lands exactly where they left off (see restoreNav in init).
function persistNav(){
  if(!STATE) return;
  STATE.nav={ view:curView, learnTab, social:socialSite, arcade:arcadePlaying };
  save();
}
// Restore the last-visited location (view + inner state) from STATE.nav. Each
// piece is validated so a stale/unknown value just falls back to a safe default.
function restoreNav(){
  const nav=(STATE && STATE.nav) || {};
  if(LEARN_TABS.some(t=>t.v===nav.learnTab)) learnTab=nav.learnTab;
  if(SOCIAL.some(s=>s.id===nav.social)) socialSite=nav.social;
  if(ARCADE_GAMES.some(g=>g.id===nav.arcade)) arcadePlaying=nav.arcade;   // switchView clears this unless we land on Arcade
  const view=["learn","game","social","settings"].includes(nav.view)?nav.view:"learn";
  // The Practice tab randomizes its own activity on entry (see renderPractice),
  // so landing there on open already varies between flashcard and word games —
  // no need to override the restored location here.
  switchView(view);
}
function switchView(v){
  if(v!=="game"){ postArcade({type:"interlude:save"}); arcadePlaying=null; }  // save + reset to launcher when leaving Arcade
  curView=v;
  document.querySelectorAll(".rico").forEach(b=>b.classList.toggle("active",b.dataset.view===v));
  document.querySelectorAll(".view").forEach(sec=>sec.classList.toggle("active",sec.id===v));
  RENDER[v]();
  persistNav();
}
document.querySelectorAll(".rico").forEach(b=>b.onclick=()=>switchView(b.dataset.view));
document.addEventListener("keydown",e=>{ if(keyHandler && !/^(INPUT|TEXTAREA)$/.test(e.target.tagName)) keyHandler(e); });

/* theme toggle */
const themeBtn=$("#theme");
function isDark(){ const t=document.documentElement.getAttribute("data-theme");
  return t? t==="dark" : matchMedia("(prefers-color-scheme:dark)").matches; }
function applyThemeIcon(){ themeBtn.innerHTML = isDark()? I.sun : I.moon; }
themeBtn.onclick=()=>{ const dark=!isDark(); document.documentElement.setAttribute("data-theme", dark?"dark":"light"); applyThemeIcon(); postArcade({type:"interlude:theme", theme: dark?"dark":"light"}); };

let prevBusy=null, latestBusy=null, closing=false, kept=false, closeTimer=null, curGen=0;
const COUNTDOWN=3;                 // seconds shown before the window closes itself
const HIDE_SENTINEL="__INTERLUDE_HIDE__";   // webview.js watches document.title for this

// Every finished state uses the same centered countdown card; only the icon,
// title, accent and end-action differ. `hide:true` steps the window aside
// (so you can approve a permission in the terminal) instead of closing it.
const MODAL={
  done:        { ic:`<svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>`,
                 title:"Claude's done",            lead:"Closing in" },
  needs_input: { ic:`<svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.5 8.7 8.7 0 0 1-3.9-.9L3 21l1.9-5.6A8.4 8.4 0 0 1 4 11.5 8.4 8.4 0 0 1 12.5 3 8.4 8.4 0 0 1 21 11.5Z"/></svg>`,
                 title:"Claude's waiting for you", lead:"Closing in" },
  permission:  { ic:`<svg viewBox="0 0 24 24"><rect x="4" y="10.5" width="16" height="10" rx="2.2"/><path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"/></svg>`,
                 title:"Claude needs permission",  lead:"Stepping aside in", hide:true },
  error:       { ic:`<svg viewBox="0 0 24 24"><path d="M12 4 2.5 20h19L12 4Z"/><path d="M12 10v4M12 17h.01"/></svg>`,
                 title:"Something went wrong",     lead:"Closing in" },
};

function cancelClose(){ if(closeTimer){ clearInterval(closeTimer); closeTimer=null; } closing=false; $("#closeModal").hidden=true; }

function keepOpen(){                 // Esc: cancel the countdown, keep the window up
  cancelClose(); kept=true; api.keep(curGen);
}

function closeNow(){                  // the big button: close immediately (even permission)
  cancelClose();
  postArcade({type:"interlude:save"});
  try{ window.close(); }catch(e){}
}

function configureModal(state){
  const m=MODAL[state]||MODAL.done;
  const card=$("#closeCard");
  card.className="close-card "+(MODAL[state]?state:"done");
  card.setAttribute("aria-label", m.title);
  $("#closeRing").innerHTML=m.ic;
  $("#closeTitle").textContent=m.title;
  $("#closeLead").textContent=m.lead;
  return m;
}

function beginCountdown(state){
  if(closing) return;
  postArcade({type:"interlude:save"});   // snapshot any in-play arcade game before we may close
  closing=true; kept=false;
  const m=configureModal(state);
  const modal=$("#closeModal"), cnt=$("#closeCount");
  let n=COUNTDOWN; cnt.textContent=n; modal.hidden=false;
  closeTimer=setInterval(()=>{
    if(latestBusy){ cancelClose(); return; }   // Claude got busy again — abort close
    n-=1;
    if(n<=0){
      clearInterval(closeTimer); closeTimer=null;
      // Permission steps aside (webview.js hides the app so you can approve in
      // the terminal); every other state closes. `closing` stays true so a
      // later resume-poll cleans up the modal.
      if(m.hide){ try{ document.title=HIDE_SENTINEL; }catch(e){} }
      else { try{ window.close(); }catch(e){} }
      return;
    }
    cnt.textContent=n;
  },1000);
}

$("#closeNow").onclick=closeNow;
window.addEventListener("keydown",e=>{ if(e.key==="Escape" && closing){ e.preventDefault(); keepOpen(); } });

/* ---------------- auto-update toast ---------------- */
let loadedVersion=null, updateReloadArmed=false, toastSig=null, lastUpdPhase=null;
const UPD_ICON = {
  download:`<svg class="icon" viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>`,
  check:`<svg class="icon" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>`,
  rocket:`<svg class="icon" viewBox="0 0 24 24"><path d="M4.5 16.5c-1.5 1.3-2 5-2 5s3.7-.5 5-2c.7-.9.7-2.2-.1-3a2.1 2.1 0 0 0-2.9 0Z"/><path d="M12 15l-3-3c1-5 4-8 9-8 0 5-3 8-8 9Z"/><path d="M9 12H5s.5-2.8 2-4 4-1 4-1"/></svg>`,
  alert:`<svg class="icon" viewBox="0 0 24 24"><path d="M12 4 2.5 20h19L12 4Z"/><path d="M12 10v4M12 17h.01"/></svg>`,
};
function hideToast(){ $("#toast").classList.remove("show"); toastSig=null; }
function showToast(o){
  const sig=(o.spinner?"spin":o.icon||"")+"|"+(o.title||"")+"|"+(o.sub||"")+"|"+(o.action?o.action.label:"");
  if(sig===toastSig) return;   // identical toast already up — avoid flicker
  toastSig=sig;
  const el=$("#toast");
  const iconHtml=o.spinner
    ? `<div class="t-ico" style="background:transparent"><div class="spin"></div></div>`
    : `<div class="t-ico">${o.icon||UPD_ICON.download}</div>`;
  el.innerHTML=`${iconHtml}<div class="t-body"><div class="t-title">${o.title||""}</div>${o.sub?`<div class="t-sub">${o.sub}</div>`:""}</div>${o.action?`<button class="t-act ${o.action.ghost?"ghost":""}" id="tAct">${o.action.label}</button>`:""}`;
  if(o.action) $("#tAct",el).onclick=o.action.onClick;
  el.classList.add("show");
}
function renderUpdate(u, version){
  u=u||{phase:"idle"}; const phase=u.phase||"idle", target=u.version||version||"";
  const entering=(phase!==lastUpdPhase); lastUpdPhase=phase;
  switch(phase){
    case "downloading":
      showToast({spinner:true, title:"Downloading update", sub:`v${target} is on the way…`}); break;
    case "downloaded": case "applying":
      showToast({spinner:true, title:"Installing update", sub:`Updating to v${target}…`}); break;
    case "updated":
      if(loadedVersion && target && target!==loadedVersion){
        showToast({icon:UPD_ICON.rocket, title:`Updated to v${target}`, sub:"Reloading…"});
        if(!updateReloadArmed){ updateReloadArmed=true;
          try{ postArcade({type:"interlude:save"}); }catch(e){}   // flush any in-play game first
          setTimeout(()=>{ try{ location.reload(); }catch(e){} }, 1300);
        }
      } else hideToast();          // already on the new version
      break;
    case "restart_needed":
      showToast({icon:UPD_ICON.check, title:`Update installed${target?` (v${target})`:""}`,
        sub:"Restart Claude Code to finish.",
        action:{label:"Dismiss", ghost:true, onClick:()=>{ api.ackUpdate(); hideToast(); }}});
      break;
    case "error":
      showToast({icon:UPD_ICON.alert, title:"Update failed", sub:"Will retry later."});
      if(entering) setTimeout(()=>{ api.ackUpdate(); hideToast(); }, 5000);
      break;
    default: hideToast();
  }
}

/* ---------------- snooze (top-right mute) ---------------- */
function fmtSnoozeLeft(ms){
  const m=Math.max(0,Math.round(ms/60000));
  if(m>=60){ const h=Math.floor(m/60); return h+"h "+(m%60)+"m"; }
  return m>=1 ? m+"m" : "<1m";
}
function renderSnooze(snz){
  const btn=$("#snoozeBtn"); if(!btn) return;
  const active = snz && snz.until && (snz.until-Date.now()>0);
  if(active){
    btn.classList.add("snoozing");
    btn.innerHTML = I.snooze + "<b>"+fmtSnoozeLeft(snz.until-Date.now())+"</b>";
    btn.title = "Snoozed — click to change or resume";
    $("#snzResume").hidden = false;
  } else {
    btn.classList.remove("snoozing");
    btn.innerHTML = I.snooze;
    btn.title = "Snooze — mute Interlude for a while";
    $("#snzResume").hidden = true;
  }
}
function wireSnooze(){
  const btn=$("#snoozeBtn"), menu=$("#snoozeMenu");
  btn.innerHTML = I.snooze;
  btn.onclick = e=>{ e.stopPropagation(); menu.hidden=!menu.hidden; };
  menu.querySelectorAll("button").forEach(b=>b.onclick=async e=>{
    e.stopPropagation();
    menu.hidden=true;
    await api.snooze(parseInt(b.dataset.h,10)||0);
    poll();                                   // reflect the new state immediately
  });
  document.addEventListener("click",()=>{ if(!menu.hidden) menu.hidden=true; });
  window.addEventListener("keydown",e=>{ if(e.key==="Escape" && !menu.hidden) menu.hidden=true; });
}

async function poll(){
  const s=await api.status(); latestBusy=s.busy; curGen=s.gen||0;
  renderSnooze(s.snooze);
  if(loadedVersion===null && s.version) loadedVersion=s.version;
  const st=$("#status"), t=$("#status-text");
  if(s.busy){
    st.className="status-pill working"; t.textContent="Claude is working…";
    cancelClose(); kept=false;                 // fresh work: reset so a later idle can count down again
  } else {
    st.className="status-pill ready"; t.textContent="Claude is ready";
    // Every finished state shows the countdown card, themed by state. Permission
    // steps aside instead of closing (handled in beginCountdown). The per-state
    // sound comes from the hook (afplay), so it fires even as the window closes.
    if(prevBusy===true && !kept){ beginCountdown((s.attention&&s.attention.state)||"done"); }
  }
  prevBusy=s.busy;
  if(s.update!==undefined) renderUpdate(s.update, s.version);   // skip on transient fetch failures
}

async function init(){
  BUILTIN=(await api.deck()).map(mapWord);
  STATE=await api.state();
  STATE.words=STATE.words||{}; STATE.games=STATE.games||{}; STATE.arcade=STATE.arcade||{}; STATE.history=STATE.history||[];
  // Seed the editable deck from the shipped starter pack once. Guarded by a
  // flag so clearing every word doesn't silently re-seed on the next open.
  if(!STATE.deckSeeded || !Array.isArray(STATE.deck)){
    STATE.deck=BUILTIN.map(w=>({...w})); STATE.deckSeeded=true; save();
  }
  DECK=STATE.deck;
  SETTINGS=await api.settings();
  applyThemeIcon(); updateChrome(); wireSnooze();
  restoreNav();
  api.checkUpdate();   // check for a new version each time the app opens
  poll(); setInterval(poll,800);
}
init();
</script>
